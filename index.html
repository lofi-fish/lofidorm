<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍管理系統</title>
    <style>
        :root {
            --main-green: #0f4c2a;
            --accent-green: #1e7a45;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f0e4;
            margin: 0;
            padding: 10px;
            color: #0f2a1f;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, var(--main-green), var(--accent-green));
            color: white;
            padding: 20px;
            text-align: center;
        }
        h1 { margin: 0; font-size: 28px; }
        .main-content { display: flex; flex-wrap: wrap; }
        .sidebar {
            width: 300px;
            background: #e6f0ea;
            padding: 15px;
            border-right: 1px solid #b0d4b8;
            height: 100vh;
            overflow-y: auto;
        }
        .content { flex: 1; padding: 20px; min-width: 300px; }
        .floor-header {
            padding: 12px 15px;
            background: var(--main-green);
            color: white;
            font-weight: bold;
            margin: 8px 0 4px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .room-item {
            padding: 12px 15px;
            margin: 4px 0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .room-item:hover, .room-item.active { background: #b0d4b8; }
        .warehouse-tag {
            display: inline-block;
            background: #ff9800;
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background: var(--accent-green);
            color: white;
            cursor: pointer;
            margin: 5px 0;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            position: relative;
        }
        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>宿舍管理系統</h1>
        </header>
        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <h2>房間列表</h2>
                <div id="room-list"></div>
                
                <h2 style="margin-top:30px">宿舍管理</h2>
                <button onclick="showApplyStayModal()">申請入住</button>
                <button onclick="showApplyLeaveModal()">申請退宿</button>
                
                <h2 style="margin-top:30px">資料備份</h2>
                <button onclick="exportData()">📤 匯出資料</button>
                <button onclick="importData()">📥 匯入資料</button>
            </div>
            
            <!-- Main Content -->
            <div class="content" id="main-content">
                <h2 id="current-room-title">請選擇房間</h2>
                
                <!-- 入住管理 -->
                <div id="room-info"></div>
                
                <!-- 抄表區域 -->
                <div id="meter-section">
                    <h3>電表抄表</h3>
                    <input type="date" id="meter-date" value="2026-06-21">
                    <input type="file" id="meter-photo" accept="image/*" onchange="handlePhotoUpload(event)">
                    <button onclick="takePhoto()">📱 直接拍照</button>
                    <button onclick="performOCR()">🤖 OCR 辨識度數</button>
                    <input type="number" id="meter-reading" placeholder="本期電表度數" step="0.1">
                    <button onclick="saveMeterReading()">儲存抄表紀錄</button>
                </div>
                
                <!-- 歷史紀錄 -->
                <h3>歷史抄表紀錄</h3>
                <table id="history-table">
                    <thead><tr><th>日期</th><th>度數</th><th>用電量</th><th>電費</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 申請入住 Modal -->
    <div id="apply-stay-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-stay-modal')">×</span>
            <h2>申請入住</h2>
            <select id="apply-room"></select><br><br>
            <input type="text" id="apply-name" placeholder="入住姓名"><br><br>
            <input type="date" id="apply-date"><br><br>
            <label><input type="checkbox" id="apply-warehouse"> 申請作為倉庫</label><br><br>
            <button onclick="submitApplyStay()">送出申請</button>
        </div>
    </div>

    <!-- 申請退宿 Modal -->
    <div id="apply-leave-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-leave-modal')">×</span>
            <h2>申請退宿</h2>
            <select id="leave-room"></select><br><br>
            <input type="date" id="leave-date"><br><br>
            <button onclick="submitApplyLeave()">送出申請</button>
        </div>
    </div>

    <script>
        let rooms = {
            "1-1": { name: "簡鴻存", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 3732.2}] },
            "1-2": { name: "簡鴻存", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 1480}] },
            "1-3": { name: "劉雨婷", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 1886.3}] },
            "1-4": { name: "李美娟", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2663.6}] },
            "1-5": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 13.8}] },
            "1-6": { name: "楊曉嵐", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1308.4}] },
            "1-7": { name: "蘇建政", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1955.6}] },
            "2-1": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1065.5}] },
            "2-2": { name: "宿舍備品室", isWarehouse: false, managementFee: 0, readings: [{date: "2026-05-04", value: 385.2}] },
            "2-3": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 745.3}] },
            "2-4": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2084.9}] },
            "2-5": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2066.2}] },
            "2-6": { name: "蔡玉萍", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2665}] },
            "2-7": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 581}] },
            "3-1": { name: "劉雨婷", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 530.2}] },
            "3-2": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 611.7}] },
            "3-3": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1689.9}] },
            "3-4": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 429.9}] },
            "3-5": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 803}] },
            "3-6": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2389.4}] },
            "3-7": { name: "楊曉嵐", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 997.4}] },
            "4-1": { name: "廠商房", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 762.5}] },
            "4-2": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 998.6}] },
            "4-3": { name: "王岑瑄", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-31", value: 3308.6}] },
            "4-4": { name: "王岑瑄", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-31", value: 903.1}] },
            "4-5": { name: "李泓楷", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1177.1}] },
            "4-6": { name: "張正詮", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1407}] },
            "4-7": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1270}] },
            "5-1": { name: "謝俊逸", isWarehouse: false, managementFee: 2400, readings: [{date: "2026-05-04", value: 4043.4}] },
            "公共區域Ａ": { name: "", isWarehouse: false, managementFee: 0, readings: [{date: "2026-05-04", value: 0}] },
            "公共區域Ｂ": { name: "", isWarehouse: false, managementFee: 0, readings: [{date: "2026-05-04", value: 0}] }
        };

        let currentRoom = "1-1";

        function renderRoomList() {
            const list = document.getElementById('room-list');
            list.innerHTML = '';
            
            const floors = {
                '第一排': ['1-1','1-2','1-3','1-4','1-5','1-6','1-7'],
                '第二排': ['2-1','2-2','2-3','2-4','2-5','2-6','2-7'],
                '第三排': ['3-1','3-2','3-3','3-4','3-5','3-6','3-7'],
                '第四排': ['4-1','4-2','4-3','4-4','4-5','4-6','4-7'],
                '第五排': ['5-1'],
                '公共區域': ['公共區域Ａ', '公共區域Ｂ']
            };

            Object.keys(floors).forEach(floorName => {
                const header = document.createElement('div');
                header.className = 'floor-header';
                header.innerHTML = floorName + ' <span>▼</span>';
                header.onclick = () => toggleFloor(header);
                list.appendChild(header);

                const floorDiv = document.createElement('div');
                floorDiv.style.display = floorName === '第一排' ? 'block' : 'none';
                floors[floorName].forEach(roomId => {
                    if (!rooms[roomId]) return;
                    const room = rooms[roomId];
                    const item = document.createElement('div');
                    item.className = `room-item ${roomId === currentRoom ? 'active' : ''}`;
                    item.innerHTML = `${roomId} ${room.name || '(空房)'} ${room.isWarehouse ? '<span class="warehouse-tag">倉庫</span>' : ''}`;
                    item.onclick = () => switchRoom(roomId);
                    floorDiv.appendChild(item);
                });
                list.appendChild(floorDiv);
            });
        }

        function switchRoom(roomId) {
            currentRoom = roomId;
            renderRoomList();
            renderCurrentRoom();
            renderHistory();
        }

        function renderCurrentRoom() {
            const room = rooms[currentRoom];
            document.getElementById('current-room-title').textContent = currentRoom + ' - ' + (room.name || '(空房)');
            
            let infoHTML = `
                <p><strong>管理費:</strong> ${room.managementFee} 元</p>
                ${room.isWarehouse ? '<p><span class="warehouse-tag">倉庫</span></p>' : ''}
            `;
            document.getElementById('room-info').innerHTML = infoHTML;
        }

        function toggleFloor(el) {
            const next = el.nextElementSibling;
            next.style.display = next.style.display === 'none' ? 'block' : 'none';
        }

        // Modal functions
        function showApplyStayModal() {
            const modal = document.getElementById('apply-stay-modal');
            const select = document.getElementById('apply-room');
            select.innerHTML = '<option value="">選擇房間</option>';
            Object.keys(rooms).forEach(key => {
                const room = rooms[key];
                if ((!room.name || room.name === '') && !key.includes('公共區域')) {
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.textContent = key;
                    select.appendChild(opt);
                }
            });
            modal.style.display = 'block';
        }

        function showApplyLeaveModal() {
            const modal = document.getElementById('apply-leave-modal');
            const select = document.getElementById('leave-room');
            select.innerHTML = '<option value="">選擇房間</option>';
            Object.keys(rooms).forEach(key => {
                const room = rooms[key];
                if (room.name && room.name !== '') {
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.textContent = `${key} - ${room.name}`;
                    select.appendChild(opt);
                }
            });
            modal.style.display = 'block';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function submitApplyStay() {
            const roomId = document.getElementById('apply-room').value;
            const name = document.getElementById('apply-name').value.trim();
            const isWarehouse = document.getElementById('apply-warehouse').checked;
            
            if (roomId && name) {
                rooms[roomId].name = name;
                rooms[roomId].isWarehouse = isWarehouse;
                rooms[roomId].managementFee = isWarehouse ? 500 : 1600;
                if (roomId === "5-1") rooms[roomId].managementFee = 2400;
                closeModal('apply-stay-modal');
                renderRoomList();
                renderCurrentRoom();
                alert('✅ 入住申請成功！房間狀態已自動更新。');
            } else {
                alert('請填寫完整資訊');
            }
        }

        function submitApplyLeave() {
            const roomId = document.getElementById('leave-room').value;
            const date = document.getElementById('leave-date').value;
            
            if (roomId) {
                rooms[roomId].name = "";
                rooms[roomId].isWarehouse = false;
                rooms[roomId].managementFee = roomId === "5-1" ? 2400 : 1600;
                closeModal('apply-leave-modal');
                renderRoomList();
                renderCurrentRoom();
                alert('✅ 退宿成功！房間已變成空房。');
            }
        }

        // Meter functions (simplified)
        function handlePhotoUpload(e) {
            alert('照片已上傳（模擬）');
        }

        function takePhoto() {
            alert('📱 開啟相機（模擬功能）');
        }

        function performOCR() {
            alert('🤖 OCR 辨識中...（模擬）\n建議手動輸入度數');
        }

        function saveMeterReading() {
            const date = document.getElementById('meter-date').value;
            const value = parseFloat(document.getElementById('meter-reading').value);
            if (!value) {
                alert('請輸入度數');
                return;
            }
            if (!rooms[currentRoom].readings) rooms[currentRoom].readings = [];
            rooms[currentRoom].readings.push({date: date, value: value});
            renderHistory();
            alert('✅ 抄表紀錄已儲存！');
        }

        function renderHistory() {
            const tbody = document.querySelector('#history-table tbody');
            tbody.innerHTML = '';
            const readings = rooms[currentRoom].readings || [];
            readings.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r.date}</td><td>${r.value}</td><td>-</td><td>-</td>`;
                tbody.appendChild(tr);
            });
        }

        function exportData() {
            const dataStr = JSON.stringify(rooms, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', 'dorm_backup.json');
            link.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = ev => {
                    rooms = JSON.parse(ev.target.result);
                    renderRoomList();
                    switchRoom("1-1");
                    alert('✅ 資料已成功匯入！');
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Initialize
        window.onload = function() {
            renderRoomList();
            switchRoom("1-1");
            console.log("✅ 宿舍管理系統完整版本已載入");
        };
    </script>
</body>
</html>
