<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍管理系統</title>
    <style>
        :root {
            --main-green: #0f4c2a;
            --accent-green: #1e7a45;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f0e4;
            margin: 0;
            padding: 10px;
            color: #0f2a1f;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, var(--main-green), var(--accent-green));
            color: white;
            padding: 20px;
            text-align: center;
        }
        h1 { margin: 0; font-size: 28px; }
        .main-content { display: flex; flex-wrap: wrap; }
        .sidebar {
            width: 300px;
            background: #e6f0ea;
            padding: 15px;
            border-right: 1px solid #b0d4b8;
            height: 100vh;
            overflow-y: auto;
        }
        .content { flex: 1; padding: 20px; min-width: 300px; }
        .floor-header {
            padding: 12px 15px;
            background: var(--main-green);
            color: white;
            font-weight: bold;
            margin: 8px 0 4px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .room-item {
            padding: 12px 15px;
            margin: 4px 0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .room-item:hover, .room-item.active { background: #b0d4b8; }
        .warehouse-tag {
            display: inline-block;
            background: #ff9800;
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }
        .warning-banner {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background: var(--accent-green);
            color: white;
            cursor: pointer;
            margin: 5px 0;
        }
        input, select, textarea { padding: 8px; margin: 4px 0; width: 100%; box-sizing: border-box; }
        .form-group { margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>宿舍管理系統</h1>
        </header>
        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <h2>房間列表</h2>
                <div id="room-list"></div>
                
                <hr>
                <h3>📋 申請管理</h3>
                <button onclick="showApplicationForm()">新增申請宿舍 / 退宿</button>
                
                <hr>
                <h3>💾 資料備份</h3>
                <button onclick="exportData()">📤 匯出資料 (JSON)</button>
                <button onclick="importData()">📥 匯入資料</button>
                
                <div id="warning-banner" class="warning-banner" style="display:none;">
                    ⚠️ localStorage 無法使用（sandbox 環境），請務必使用「匯出 / 匯入資料」手動備份！
                    <button onclick="this.parentElement.style.display='none'" style="background:#dc3545;margin-left:10px;">知道了</button>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="content" id="main-content">
                <div id="current-room-info"></div>
            </div>
        </div>
    </div>

    <script>
        // 完整房間資料
        let rooms = {
            "1-1": { name: "簡鴻存", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 3732.2}] },
            "1-2": { name: "簡鴻存", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 1480}] },
            "1-3": { name: "劉雨婷", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 1886.3}] },
            "1-4": { name: "李美娟", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2663.6}] },
            "1-5": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 13.8}] },
            "1-6": { name: "楊曉嵐", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1308.4}] },
            "1-7": { name: "蘇建政", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1955.6}] },
            
            "2-1": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1065.5}] },
            "2-2": { name: "宿舍備品室", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 385.2}] },
            "2-3": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 745.3}] },
            "2-4": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2084.9}] },
            "2-5": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2066.2}] },
            "2-6": { name: "蔡玉萍", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2665}] },
            "2-7": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 581}] },
            
            "3-1": { name: "劉雨婷", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 530.2}] },
            "3-2": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 611.7}] },
            "3-3": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1689.9}] },
            "3-4": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 429.9}] },
            "3-5": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 803}] },
            "3-6": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2389.4}] },
            "3-7": { name: "楊曉嵐", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 997.4}] },
            
            "4-1": { name: "廠商房", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 762.5}] },
            "4-2": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 998.6}] },
            "4-3": { name: "王岑瑄", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 3172.1}, {date: "2026-05-31", value: 3308.6}] },
            "4-4": { name: "王岑瑄", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 886}, {date: "2026-05-31", value: 903.1}] },
            "4-5": { name: "李泓楷", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1177.1}] },
            "4-6": { name: "張正詮", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1407}] },
            "4-7": { name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1270}] },
            
            "5-1": { name: "謝俊逸", isWarehouse: false, managementFee: 2400, readings: [{date: "2026-05-04", value: 4043.4}] },
            
            "公共區域": { name: "", isWarehouse: false, managementFee: 0, readings: [{date: "2026-05-04", value: 0}] },
            "公共區域Ａ": { name: "", isWarehouse: false, managementFee: 0, readings: [{date: "2026-05-04", value: 0}] },
            "公共區域Ｂ": { name: "", isWarehouse: false, managementFee: 0, readings: [{date: "2026-05-04", value: 0}] }
        };

        let currentRoom = "1-1";

        function renderRoomList() {
            const container = document.getElementById('room-list');
            container.innerHTML = `
                <div class="floor-header" onclick="toggleFloor(this)">第一排 ▼</div>
                <div class="floor-content" id="floor1"></div>
                <div class="floor-header" onclick="toggleFloor(this)">第二排 ▼</div>
                <div class="floor-content" id="floor2" style="display:none"></div>
                <div class="floor-header" onclick="toggleFloor(this)">第三排 ▼</div>
                <div class="floor-content" id="floor3" style="display:none"></div>
                <div class="floor-header" onclick="toggleFloor(this)">第四排 ▼</div>
                <div class="floor-content" id="floor4" style="display:none"></div>
                <div class="floor-header" onclick="toggleFloor(this)">第五排 ▼</div>
                <div class="floor-content" id="floor5" style="display:none"></div>
                <div class="floor-header" onclick="toggleFloor(this)">公共區域 ▼</div>
                <div class="floor-content" id="floor-public" style="display:none"></div>
            `;

            Object.keys(rooms).forEach(roomId => {
                const room = rooms[roomId];
                const item = document.createElement('div');
                item.className = `room-item ${roomId === currentRoom ? 'active' : ''}`;
                item.innerHTML = `${roomId} ${room.name ? room.name : '(空房)'}
                    ${room.isWarehouse ? '<span class="warehouse-tag">倉庫</span>' : ''}`;
                item.onclick = () => switchRoom(roomId);

                if (roomId.startsWith('1-')) document.getElementById('floor1').appendChild(item);
                else if (roomId.startsWith('2-')) document.getElementById('floor2').appendChild(item);
                else if (roomId.startsWith('3-')) document.getElementById('floor3').appendChild(item);
                else if (roomId.startsWith('4-')) document.getElementById('floor4').appendChild(item);
                else if (roomId === '5-1') document.getElementById('floor5').appendChild(item);
                else document.getElementById('floor-public').appendChild(item);
            });
        }

        function switchRoom(roomId) {
            currentRoom = roomId;
            renderRoomList();
            
            const room = rooms[roomId];
            const latestReading = room.readings[room.readings.length - 1] || {value: '無', date: '無'};
            
            let html = `
                <h2>${roomId} ${room.name || '(空房)'}</h2>
                ${room.isWarehouse ? '<span class="warehouse-tag" style="font-size:16px;padding:6px 12px;">倉庫</span>' : ''}
                <div class="form-group">
                    <label>入住姓名</label>
                    <input type="text" id="room-name" value="${room.name || ''}" placeholder="輸入姓名">
                    <button onclick="updateRoomName()">更新姓名</button>
                </div>
                <div class="form-group">
                    <label>管理費</label>
                    <p><strong>${room.managementFee} 元 / 月</strong></p>
                </div>
                
                <!-- 電表抄表區 -->
                <h3>📸 電表抄表</h3>
                <div class="form-group">
                    <input type="file" id="meter-photo" accept="image/*" onchange="handlePhotoUpload(this)">
                    <button onclick="takePhoto()">📱 直接拍照</button>
                </div>
                <div class="form-group">
                    <label>本期電表度數</label>
                    <input type="number" id="meter-value" step="0.1" placeholder="例如 1234.5">
                    <button onclick="performOCR()">🤖 OCR 自動辨識</button>
                </div>
                <button onclick="saveReading()" style="background:#28a745;width:100%;">儲存本次抄表</button>
                
                <!-- 歷史紀錄 -->
                <h3>歷史抄表紀錄</h3>
                <table>
                    <tr><th>日期</th><th>度數</th><th>用電量</th><th>電費</th></tr>
            `;
            
            room.readings.forEach((r, i) => {
                let usage = 0;
                if (i > 0) {
                    usage = r.value - room.readings[i-1].value;
                }
                const fee = Math.ceil(usage) * 5;
                html += `<tr><td>${r.date}</td><td>${r.value}</td><td>${usage.toFixed(1)}</td><td>${fee}</td></tr>`;
            });
            
            html += `</table>`;
            
            document.getElementById('current-room-info').innerHTML = html;
        }

        function updateRoomName() {
            const newName = document.getElementById('room-name').value.trim();
            if (newName) {
                rooms[currentRoom].name = newName;
                switchRoom(currentRoom);
                alert('姓名已更新！');
            }
        }

        function saveReading() {
            const value = parseFloat(document.getElementById('meter-value').value);
            if (isNaN(value)) {
                alert("請輸入有效度數！");
                return;
            }
            rooms[currentRoom].readings.push({
                date: new Date().toISOString().split('T')[0],
                value: value
            });
            switchRoom(currentRoom);
            alert("抄表紀錄已儲存！");
        }

        function handlePhotoUpload(input) {
            if (input.files && input.files[0]) {
                alert("照片已上傳（模擬） - 在完整版中會處理圖片");
            }
        }

        function takePhoto() {
            alert("📱 開啟相機功能（模擬）\n在真實手機環境中會呼叫相機");
        }

        function performOCR() {
            alert("🤖 OCR 辨識中...（模擬）\n請手動輸入度數");
        }

        function toggleFloor(el) {
            const content = el.nextElementSibling;
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
        }

        function exportData() {
            const dataStr = JSON.stringify(rooms, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.href = dataUri;
            link.download = 'dorm_backup.json';
            link.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        rooms = JSON.parse(ev.target.result);
                        switchRoom(currentRoom);
                        alert("資料已成功匯入！");
                    } catch(err) {
                        alert("JSON 檔案格式錯誤！");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function showApplicationForm() {
            alert("📋 申請宿舍 / 退宿功能\n\n（此功能可後續擴充完整表單）");
        }

        // Initialize
        window.onload = function() {
            renderRoomList();
            switchRoom("1-1");
            console.log("✅ 宿舍管理系統完整版本已載入！");
            
            // 顯示 sandbox 警告
            if (typeof localStorage === 'undefined' || !localStorage) {
                document.getElementById('warning-banner').style.display = 'block';
            }
        };
    </script>
</body>
</html>
