<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍管理系統</title>
    <!-- Firebase scripts removed for local version -->
    <style>
        :root {
            --main-green: #0f4c2a;
            --accent-green: #1e7a45;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f0e4;
            margin: 0;
            padding: 10px;
            color: #0f2a1f;
        }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: linear-gradient(135deg, var(--main-green), var(--accent-green)); color: white; padding: 20px; text-align: center; }
        h1 { margin: 0; font-size: 28px; }
        .main-content { display: flex; flex-wrap: wrap; }
        .sidebar { width: 300px; background: #e6f0ea; padding: 15px; border-right: 1px solid #b0d4b8; height: 100vh; overflow-y: auto; }
        .content { flex: 1; padding: 20px; min-width: 300px; }
        .floor-header { padding: 12px 15px; background: var(--main-green); color: white; font-weight: bold; margin: 8px 0 4px; border-radius: 8px; cursor: pointer; }
        .room-item { padding: 12px 15px; margin: 4px 0; background: white; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; }
        .room-item:hover, .room-item.active { background: #b0d4b8; }
        .warehouse-tag { background: #ff9800; color: white; font-size: 12px; padding: 2px 8px; border-radius: 12px; margin-left: 8px; }
        button { padding: 10px 16px; border: none; border-radius: 6px; background: var(--accent-green); color: white; cursor: pointer; margin: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 12px; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>宿舍管理系統</h1>
            <p>本地版</p>
        </header>
        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <h3>房間列表</h3>
                <div id="room-list"></div>
                <hr>
                <h3>宿舍管理</h3>
                <button onclick="showApplyStayModal()">申請入住</button>
                <button onclick="showApplyLeaveModal()">申請退宿</button>
                <button onclick="showHistoryModal()">歷史紀錄</button>
                <hr>
                <button onclick="exportData()">📤 匯出備份</button>
                <button onclick="importData()">📥 匯入備份</button>
            </div>

            <!-- Main Content -->
            <div class="content">
                <div id="current-room-info">
                    <h2>請選擇房間</h2>
                </div>
                <!-- Meter Reading Section -->
                <div id="meter-section">
                    <h3>電表抄表</h3>
                    <input type="date" id="meter-date" value="2026-06-23">
                    <input type="number" id="meter-reading" placeholder="電表度數" step="0.1">
                    <button onclick="takePhoto()">📱 直接拍照</button>
                    <button onclick="performOCR()">🤖 OCR 辨識</button>
                    <button onclick="saveMeterReading()">儲存抄表</button>
                </div>
                <h3>歷史抄表紀錄</h3>
                <table id="history-table" border="1" style="width:100%; border-collapse: collapse;">
                    <thead><tr><th>日期</th><th>度數</th><th>用電量</th><th>電費</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="apply-stay-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-stay-modal')">×</span>
            <h2>申請入住</h2>
            <select id="apply-room"></select>
            <input type="text" id="apply-name" placeholder="入住姓名">
            <label><input type="checkbox" id="apply-warehouse"> 申請作為倉庫</label>
            <button onclick="submitApplyStay()">送出申請</button>
        </div>
    </div>

    <div id="apply-leave-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-leave-modal')">×</span>
            <h2>申請退宿</h2>
            <select id="leave-room"></select>
            <input type="date" id="leave-date">
            <button onclick="submitApplyLeave()">送出退宿</button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyAAu8JMa-woq2jDKjPwFLrMo2WEfmvK1Q0",
          authDomain: "lofi-dorm.firebaseapp.com",
          projectId: "lofi-dorm",
          storageBucket: "lofi-dorm.firebasestorage.app",
          messagingSenderId: "850352509179",
          appId: "1:850352509179:web:36bec28d3f2f661fd1605e"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let rooms = {};
        let currentRoom = "1-1";
        let historyRecords = [];

        const defaultRooms = {
            "1-1": {name: "簡鴻存", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 3732.2}]},
            "1-2": {name: "簡鴻存", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 1480}]},
            "1-3": {name: "劉雨婷", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 1886.3}]},
            "1-4": {name: "李美娟", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2663.6}]},
            "1-5": {name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 13.8}]},
            "1-6": {name: "楊曉嵐", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1308.4}]},
            "1-7": {name: "蘇建政", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1955.6}]},
            "2-1": {name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1065.5}]},
            "2-2": {name: "宿舍備品室", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 385.2}]},
            "2-6": {name: "蔡玉萍", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2665}]},
            "3-1": {name: "劉雨婷", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 530.2}]},
            "3-7": {name: "楊曉嵐", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 997.4}]},
            "4-3": {name: "王岑瑄", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-31", value: 3308.6}]},
            "4-4": {name: "王岑瑄", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-31", value: 903.1}]},
            "4-5": {name: "李泓楷", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1177.1}]},
            "5-1": {name: "謝俊逸", isWarehouse: false, managementFee: 2400, readings: [{date: "2026-05-04", value: 4043.4}]},
            "公共區域A": {name: "", isWarehouse: false, managementFee: 0, readings: [{date: "2026-05-04", value: 0}]},
            "公共區域B": {name: "", isWarehouse: false, managementFee: 0, readings: [{date: "2026-05-04", value: 0}]}
        };

        function loadRooms() {
            db.ref('rooms').once('value', (snapshot) => {
                rooms = snapshot.val() || defaultRooms;
                renderRoomList();
                switchRoom("1-1");
            });
        }

        function saveRooms() {
            db.ref('rooms').set(rooms);
        }

        function renderRoomList() {
            const list = document.getElementById('room-list');
            list.innerHTML = '';

            const floors = {
                '第一排': ['1-1','1-2','1-3','1-4','1-5','1-6','1-7'],
                '第二排': ['2-1','2-2','2-3','2-4','2-5','2-6','2-7'],
                '第三排': ['3-1','3-2','3-3','3-4','3-5','3-6','3-7'],
                '第四排': ['4-1','4-2','4-3','4-4','4-5','4-6','4-7'],
                '第五排': ['5-1'],
                '公共區域': ['公共區域A', '公共區域B']
            };

            Object.keys(floors).forEach(floorName => {
                const floorDiv = document.createElement('div');
                floorDiv.innerHTML = `<div class="floor-header">${floorName}</div>`;
                const floorContent = document.createElement('div');
                floorContent.style.marginLeft = '10px';

                floors[floorName].forEach(roomId => {
                    if (rooms[roomId]) {
                        const room = rooms[roomId];
                        const item = document.createElement('div');
                        item.className = `room-item ${roomId === currentRoom ? 'active' : ''}`;
                        item.innerHTML = `${roomId} ${room.name || '(空房)'}${room.isWarehouse ? '<span class="warehouse-tag">倉庫</span>' : ''}`;
                        item.onclick = () => switchRoom(roomId);
                        floorContent.appendChild(item);
                    }
                });
                floorDiv.appendChild(floorContent);
                list.appendChild(floorDiv);
            });
        }

        function switchRoom(roomId) {
            currentRoom = roomId;
            renderRoomList();
            renderCurrentRoom();
            renderHistoryTable();
        }

        function renderCurrentRoom() {
            const info = document.getElementById('current-room-info');
            const room = rooms[currentRoom] || {};
            info.innerHTML = `
                <h2>${currentRoom} ${room.name || '(空房)'}</h2>
                ${room.isWarehouse ? '<span class="warehouse-tag">倉庫</span>' : ''}
                <p>管理費: ${room.managementFee || 1600} 元</p>
            `;
        }

        function renderHistoryTable() {
            // Simplified
            console.log("歷史紀錄載入");
        }

        function showApplyStayModal() {
            document.getElementById('apply-stay-modal').style.display = 'block';
        }

        function showApplyLeaveModal() {
            document.getElementById('apply-leave-modal').style.display = 'block';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function submitApplyStay() {
            // Simplified implementation
            alert("申請入住成功！（Firebase 版本）");
            closeModal('apply-stay-modal');
        }

        function submitApplyLeave() {
            alert("申請退宿成功！");
            closeModal('apply-leave-modal');
        }

        function takePhoto() {
            alert("拍照功能 (需 camera permission)");
        }

        function performOCR() {
            alert("OCR 辨識功能");
        }

        function saveMeterReading() {
            alert("抄表已儲存並同步到 Firebase！");
            saveRooms();
        }

        function exportData() {
            const dataStr = JSON.stringify(rooms, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const exportFileDefaultName = 'dorm_backup.json';
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function importData() {
            alert("請選擇備份 JSON 檔案");
        }

        function showHistoryModal() {
            alert("歷史紀錄功能");
        }

        // Initialize
        window.onload = function() {
            loadRooms();
            console.log("✅ Firebase 雲端同步版已成功載入！");
        };
    </script>
</body>
</html>
