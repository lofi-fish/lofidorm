<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍管理系統 (雲端同步版)</title>
    <style>
        :root { --main-green: #0f4c2a; --accent-green: #1e7a45; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e0f0e4; margin: 0; padding: 0; color: #0f2a1f; }
        
        nav { background: linear-gradient(135deg, var(--main-green), var(--accent-green)); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 101; }
        nav h1 { margin: 0; font-size: 20px; cursor: pointer; }
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 10px; margin: 0; }

        .container { max-width: 1200px; margin: 0 auto; background: white; min-height: 100vh; display: flex; position: relative; }
        
        .sidebar { width: 320px; background: #e6f0ea; padding: 15px; border-right: 1px solid #b0d4b8; box-sizing: border-box; transition: transform 0.3s ease; z-index: 100; }
        .content { flex: 1; padding: 20px; min-width: 300px; position: relative; box-sizing: border-box; }
        
        .floor-header { padding: 12px 15px; background: var(--main-green); color: white; font-weight: bold; margin: 8px 0 4px; border-radius: 8px; cursor: pointer; }
        .floor-content { display: block; }
        
        .room-item { padding: 12px 15px; margin: 4px 0; background: white; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; font-size: 15px; }
        .room-item.empty-room { background: #f2f2f2; color: #777; }
        .room-item:hover, .room-item.active { background: #b0d4b8 !important; color: #0f2a1f !important; }
        
        .tag { font-size: 11px; padding: 2px 6px; border-radius: 12px; margin-left: 5px; color: white; display: inline-block; font-weight: normal; vertical-align: middle; }
        .tag-warehouse { background: #ff9800; }
        .tag-leave { background: #666666; }
        .tag-temp { background: #2196F3; }
        .tag-special { background: #7e57c2; }
        .tag-booking { background: #e91e63; }
        .tag-leave-status { background: #e65100; }
        .tag-warden { background: #009688; }
        
        button { padding: 12px 16px; border: none; border-radius: 6px; background: var(--accent-green); color: white; cursor: pointer; margin: 5px 2px; font-size: 15px; }
        button:hover { background: #0f4c2a; }
        .btn-danger { background-color: #d9534f; }
        .btn-danger:hover { background-color: #c9302c; }
        .sidebar button { width: 100%; margin: 5px 0; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1002; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 480px; border-radius: 12px; position: relative; box-sizing: border-box; max-height: 85vh; overflow-y: auto; }
        .close { position: absolute; top: 10px; right: 20px; font-size: 32px; cursor: pointer; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin: 6px 0 12px 0; box-sizing: border-box; font-size: 15px; width: 100%; }
        
        #meter-section { background: #f4fdf7; padding: 15px; border-radius: 8px; border: 1px solid #b0d4b8; margin-bottom: 20px; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1005; text-align: center; padding-top: 200px; font-size: 18px; font-weight: bold; color: var(--main-green); }
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 650px; }
        th, td { padding: 10px 6px; font-size: 14px; border: 1px solid #ddd; }
        
        .floor-group-0 { background-color: #ffffff; }
        .floor-group-1 { background-color: #f7faf8; }
        .floor-group-2 { background-color: #edf5ef; }
        .floor-group-3 { background-color: #e3efe6; }
        .floor-group-4 { background-color: #d8eada; }
        .floor-group-5 { background-color: #fcfcfc; }
        .floor-row-header { font-weight: bold; background-color: #e2ede4 !important; border-top: 2px solid var(--main-green); text-align: left; padding-left: 12px; }

        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99; }

        .bill-summary-box { background: #fffde6; padding: 20px; border-radius: 8px; border: 1px solid #e6db55; margin-top: 10px; }
        .setting-panel { background: #f0f4f1; padding: 12px; border-radius: 8px; border: 1px solid #cbdcd0; margin-top: 15px; font-size: 14px; }
        .setting-panel input { padding: 6px; margin: 4px 0 8px 0; font-size: 13px; }
        
        .history-log-box { font-size: 12px; max-height: 100px; overflow-y: auto; background: white; padding: 6px; border: 1px solid #ccc; margin-top: 8px; border-radius: 4px; text-align: left; }
        .calc-preview { font-size: 13px; background: #fff3e0; padding: 10px; border-radius: 6px; border: 1px solid #ffe0b2; margin: 10px 0; color: #e65100; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; top: 58px; left: 0; height: calc(100vh - 58px); transform: translateX(-100%); overflow-y: auto; box-shadow: 4px 0 10px rgba(0,0,0,0.1); background: #f4fbf7; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .content { padding: 15px; width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h1>🏠 宿舍管理系統 (v24.1 行政穩定版)</h1>
        <button onclick="loadCloudData()" style="padding: 6px 12px; font-size: 13px; background: #2196F3; margin:0;">🔄 重整刷新</button>
    </nav>

    <div class="container">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>

        <div class="sidebar" id="sidebar">
            <button onclick="showDefaultHome()" style="background: #2a6e45; font-weight:bold; padding: 12px; font-size: 15px; margin-bottom: 12px; border: 1px solid #fff;">📊 顯示總體財務清冊</button>
            <hr style="margin-top:0;">
            
            <h3>宿舍入住管理</h3>
            <button onclick="showApplyStayModal()">長期入住申請</button>
            <button onclick="showTempStayModal()" style="background-color: #2196F3;">臨時入住申請</button>
            <button onclick="showSpecialRequestModal()" style="background-color: #7e57c2;">✨ 特殊需求申請</button>
            <button onclick="showApplyLeaveModal()">申請退宿清除</button>
            <hr>
            
            <h3>房間列表</h3>
            <div id="room-list"></div>
            <hr>
            
            <div class="setting-panel">
                <b style="color: var(--main-green);">⚙️ 費率變更與實施設定</b>
                <label style="display:block; margin-top:6px;">一般月管理費：<input type="number" id="cfg-mgmt-fee" value="1600"></label>
                <label style="display:block;">倉庫月管理費：<input type="number" id="cfg-wh-fee" value="500"></label>
                <label style="display:block;">5-1套房管理費：<input type="number" id="cfg-suite-fee" value="2400"></label>
                <label style="display:block;">實施公告日期：<input type="date" id="cfg-effective-date" value="2026-06-27"></label>
                <button onclick="saveConfigParams()" style="width:100%; padding:6px; font-size:13px; background:#4caf50; margin-top:4px;">套用並記錄新費率</button>
                
                <div style="margin-top:10px; font-weight:bold; color:#555;">📋 費率變更歷史：</div>
                <div class="history-log-box" id="rate-history-log">暫無歷史變更紀錄</div>
            </div>
            
            <button onclick="exportData()" style="background-color: #666; font-size: 12px; padding: 6px;">📤 匯出系統備份</button>
            <button onclick="triggerImport()" style="background-color: #666; font-size: 12px; padding: 6px;">📥 匯入系統備份</button>
            <input type="file" id="import-file" style="display:none" onchange="importData(this)">
        </div>

        <div class="content">
            <div id="loading-overlay">⏳ 雲端資料同步中...</div>
            <div id="main-display-area"></div>
        </div>
    </div>

    <div id="apply-stay-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-stay-modal')">×</span>
            <h2>長期入住申請</h2>
            <label>選擇房間：</label>
            <select id="apply-room"></select>
            <input type="text" id="apply-name" placeholder="入住姓名">
            <label>入住開始日期：</label>
            <input type="date" id="apply-start-date" value="2026-06-27">
            
            <label>房客特定身分 / 特殊需求：</label>
            <select id="apply-special-type" onchange="toggleApplySpecialFields()">
                <option value="NORMAL">常規常駐狀態 (依房型收費)</option>
                <option value="WAREHOUSE">申請作為倉庫 (改按倉庫費計收)</option>
                <option value="WARDEN">申請作為舍監房 (管理費免收)</option>
                <option value="ROOMMATE">申請同住狀態 (維持原費率，有同住者)</option>
            </select>

            <div id="apply-roommate-box" style="display:none;">
                <label>請輸入同住室友姓名：</label>
                <input type="text" id="apply-roommate-name" placeholder="請輸入共同入住者姓名">
            </div>

            <button onclick="submitApplyStay()" style="width:100%; margin-top:15px;">送出申請</button>
        </div>
    </div>

    <div id="temp-stay-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('temp-stay-modal')">×</span>
            <h2>臨時入住申請</h2>
            <label>選擇房間：</label>
            <select id="temp-room"></select>
            <label>申請人姓名：</label>
            <input type="text" id="temp-applicant" placeholder="請輸入申請人">
            <label style="display:block; margin: 5px 0;">
                <input type="checkbox" id="temp-same-person" onchange="syncTempName()"> 住宿大名同申請人
            </label>
            <label>住宿大名：</label>
            <input type="text" id="temp-name" placeholder="請輸入實際住宿者姓名">
            <label>預計入住日期：</label>
            <input type="date" id="temp-start-date" value="2026-06-27">
            <label>預計退房日期：</label>
            <input type="date" id="temp-end-date" value="2026-06-28">
            <label>住宿申請原因：</label>
            <select id="temp-reason-select" onchange="toggleTempReasonOther()">
                <option value="因活動需求，員工申請入住">因活動需求，員工申請入住</option>
                <option value="合作廠商入住">合作廠商入住</option>
                <option value="團客司領房">團客司領房</option>
                <option value="其他">其他 (請於下方填寫原因)</option>
            </select>
            <div id="temp-reason-other-box" style="display:none;">
                <input type="text" id="temp-reason-other-text" placeholder="請輸入自訂原因">
            </div>
            <button onclick="submitTempStay()" style="width:100%; margin-top:10px; background-color: #2196F3;">送出臨時入住</button>
        </div>
    </div>

    <div id="special-request-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('special-request-modal')">×</span>
            <h2>✨ 房客狀態特殊需求申請</h2>
            <label>選擇已入住房間：</label>
            <select id="sr-room"></select>
            
            <label>變更特殊需求：</label>
            <select id="sr-type" onchange="toggleSpecialRequestFields()">
                <option value="NORMAL">還原常規住宿狀態</option>
                <option value="WAREHOUSE">申請轉為倉庫 (改按倉庫費計收)</option>
                <option value="SECURITY">申請轉為保全夜宿房 (免收管理費)</option>
                <option value="WARDEN">申請轉為舍監房 (免收管理費)</option>
                <option value="ROOMMATE">申請同住 (維持原費率，新增室友)</option>
                <option value="LEAVE_RETENTION">房間保留 (改倉庫計費，因留職停薪)</option>
            </select>

            <div id="sr-roommate-box" style="display:none;">
                <label>請輸入室友姓名：</label>
                <input type="text" id="sr-roommate-name" placeholder="請輸入室友大名">
            </div>

            <div id="sr-leave-box" style="display:none;">
                <label>請選擇留職停薪原因：</label>
                <select id="sr-leave-reason">
                    <option value="育嬰留停">育嬰留停</option>
                    <option value="因病留停">因病留停</option>
                </select>
                
                <label>留停開始日期：</label>
                <input type="date" id="sr-leave-start" value="2026-06-27" onchange="calculateRetentionFeePreview()">
                <label>留停預估結束日期：</label>
                <input type="date" id="sr-leave-end" value="2026-07-27" onchange="calculateRetentionFeePreview()">
                
                <div class="calc-preview" id="retention-calc-box">
                    💡 請輸入正確的起迄日期進行預收費用試算。
                </div>
            </div>

            <button onclick="submitSpecialRequest()" style="width:100%; margin-top:15px; background-color: #7e57c2;">確認變更狀態</button>
        </div>
    </div>

    <div id="apply-leave-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-leave-modal')">×</span>
            <h2>申請退宿清除</h2>
            <label>選擇房間：</label>
            <select id="leave-room"></select>
            <label style="margin-top: 10px; display: block;">預定退宿日期：</label>
            <input type="date" id="leave-date" value="2026-06-27">
            <button onclick="submitApplyLeave()" style="width:100%; margin-top:10px;">送出退宿</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw95-wZ_jyk2dMG3zwPkBhVGHbYkLP0GSUM03eDctpQ955sI9u9OxKKMGuz53HUvsJxLQ/exec";
        const ELECTRICITY_RATE = 5; 
        const TODAY_STR = "2026-06-27"; 

        let rooms = {}; 
        let configParams = { mgmtFee: 1600, whFee: 500, suiteFee: 2400, historyLogs: [], deferredPayment: {}, lockedMonths: {} };
        let selectedReportMonth = "2026-06"; 

        const DEFAULT_ROOMS_DATA = {
            "1-1": {name: "簡鴻存", isWarehouse: false, readings: [{date: "2026-05-04", value: 3732.2}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-2": {name: "簡鴻存", isWarehouse: true, readings: [{date: "2026-05-04", value: 1480}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-3": {name: "劉雨婷", isWarehouse: true, readings: [{date: "2026-05-04", value: 1886.3}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-4": {name: "李美娟", isWarehouse: false, readings: [{date: "2026-05-04", value: 2663.6}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-5": {name: "", isWarehouse: false, readings: [{date: "2026-05-04", value: 13.8}], leaveDate: ""},
            "1-6": {name: "楊曉嵐", isWarehouse: false, readings: [{date: "2026-05-04", value: 1308.4}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-7": {name: "蘇建政", isWarehouse: false, readings: [{date: "2026-05-04", value: 1955.6}], leaveDate: "", checkInDate: "2026-05-01", isSecurityOnly: true},
            "2-1": {name: "", isWarehouse: false, readings: [{date: "2026-05-04", value: 1065.5}], leaveDate: ""},
            "2-2": {name: "宿舍備品室", isWarehouse: false, readings: [{date: "2026-05-04", value: 385.2}], leaveDate: "", isSpecialLock: true},
            "2-6": {name: "蔡玉萍", isWarehouse: false, readings: [{date: "2026-05-04", value: 2665}], leaveDate: "", checkInDate: "2026-05-01"},
            "3-1": {name: "劉雨婷", isWarehouse: true, readings: [{date: "2026-05-04", value: 530.2}], leaveDate: "", checkInDate: "2026-05-01"},
            "3-7": {name: "楊曉嵐", isWarehouse: false, readings: [{date: "2026-05-04", value: 997.4}], leaveDate: "", checkInDate: "2026-05-01"},
            "4-1": {name: "", isWarehouse: false, readings: [{date: "2026-05-04", value: 0}], leaveDate: "", isDriverOnly: true},
            "4-2": {name: "", isWarehouse: false, readings: [{date: "2026-05-04", value: 0}], leaveDate: "", isDriverOnly: true},
            "4-3": {name: "王岑瑄", isWarehouse: false, readings: [{date: "2026-05-31", value: 3308.6}], leaveDate: "", checkInDate: "2026-05-31"},
            "4-4": {name: "王岑瑄", isWarehouse: true, readings: [{date: "2026-05-31", value: 903.1}], leaveDate: "", checkInDate: "2026-05-31"},
            "4-5": {name: "李泓楷", isWarehouse: false, readings: [{date: "2026-05-04", value: 1177.1}], leaveDate: "", checkInDate: "2026-05-01"},
            "5-1": {name: "謝俊逸", isWarehouse: false, readings: [{date: "2026-05-04", value: 4043.4}], leaveDate: "", checkInDate: "2026-05-01"}
        };

        const ALL_FLOORS = {
            '第一排': ['1-1','1-2','1-3','1-4','1-5','1-6','1-7'],
            '第二排': ['2-1','2-2','2-3','2-4','2-5','2-6','2-7'],
            '第三排': ['3-1','3-2','3-3','3-4','3-5','3-6','3-7'],
            '第四排': ['4-1','4-2','4-3','4-4','4-5','4-6','4-7'],
            '第五排': ['5-1'],
            '公共區域': ['公共區域A', '公共開放區域B']
        };

        let currentActiveView = "home"; 

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        function showLoading(status) {
            document.getElementById('loading-overlay').style.display = status ? 'block' : 'none';
        }

        function isCurrentMonthLocked() {
            if(!configParams || !configParams.lockedMonths) return false;
            return configParams.lockedMonths[selectedReportMonth] === true;
        }

        function checkAndProcessDateStatus() {
            Object.keys(rooms).forEach(roomId => {
                const room = rooms[roomId];
                if (room.leaveDate && room.leaveDate <= TODAY_STR) {
                    room.name = ''; room.isWarehouse = false; room.leaveDate = ''; room.isTemp = false; room.tempInfo = null; room.checkInDate = ''; room.isBookingFuture = false;
                    room.isSecurityOnly = false; room.hasRoommate = false; room.roommateName = ''; room.isLeaveRetention = false; room.leaveRetentionReason = ''; room.isWarden = false;
                    if(roomId === "1-7") room.isSecurityOnly = true; 
                }
                if (room.isBookingFuture && room.checkInDate && room.checkInDate <= TODAY_STR) {
                    room.isBookingFuture = false;
                }
            });
        }

        async function loadCloudData() {
            showLoading(true);
            try {
                const response = await fetch(`${GAS_URL}?_=${new Date().getTime()}`);
                const cloudRooms = await response.json();
                
                if (cloudRooms && cloudRooms.SYSTEM_ROOMS_DATA) {
                    rooms = cloudRooms.SYSTEM_ROOMS_DATA;
                    if(cloudRooms.SYSTEM_CONFIG) {
                        configParams = cloudRooms.SYSTEM_CONFIG;
                    }
                } else if (cloudRooms && Object.keys(cloudRooms).length > 2) {
                    rooms = cloudRooms;
                } else {
                    rooms = JSON.parse(JSON.stringify(DEFAULT_ROOMS_DATA));
                    initMissingRooms();
                    await saveToCloud();
                }
            } catch (error) {
                console.error("Cloud error, loading defaults:", error);
                rooms = JSON.parse(JSON.stringify(DEFAULT_ROOMS_DATA));
            } finally {
                // 確保必要資料欄位必定健全
                if(!configParams) configParams = {};
                if(!configParams.historyLogs) configParams.historyLogs = [];
                if(!configParams.deferredPayment) configParams.deferredPayment = {};
                if(!configParams.lockedMonths) configParams.lockedMonths = {};
                if(!configParams.mgmtFee) configParams.mgmtFee = 1600;
                if(!configParams.whFee) configParams.whFee = 500;
                if(!configParams.suiteFee) configParams.suiteFee = 2400;

                document.getElementById('cfg-mgmt-fee').value = configParams.mgmtFee;
                document.getElementById('cfg-wh-fee').value = configParams.whFee;
                document.getElementById('cfg-suite-fee').value = configParams.suiteFee;

                initMissingRooms();
                checkAndProcessDateStatus(); 
                renderRoomList();
                renderRateHistory();
                
                if(currentActiveView === "home") showDefaultHome();
                else switchRoom(currentActiveView);
                
                showLoading(false); // 強制解除加載畫面
            }
        }

        async function saveToCloud() {
            showLoading(true);
            const packageData = { SYSTEM_ROOMS_DATA: rooms, SYSTEM_CONFIG: configParams };
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(packageData)
                });
            } catch (error) { console.log("Cloud synced with local update"); }
            finally {
                renderRoomList();
                renderRateHistory();
                if(currentActiveView === "home") showDefaultHome();
                else switchRoom(currentActiveView);
                showLoading(false);
            }
        }

        function saveConfigParams() {
            if(isCurrentMonthLocked()) { alert("⚠️ 當前選取的月份財務已結案鎖定，無法變更參數費率！"); return; }
            configParams.mgmtFee = parseFloat(document.getElementById('cfg-mgmt-fee').value) || 0;
            configParams.whFee = parseFloat(document.getElementById('cfg-wh-fee').value) || 0;
            configParams.suiteFee = parseFloat(document.getElementById('cfg-suite-fee').value) || 0;
            const effDate = document.getElementById('cfg-effective-date').value;

        function renderHistoryTableData(roomId) {
            const tbody = document.querySelector('#history-table tbody');

            if (!tbody || !room || !room.readings) return;
            tbody.innerHTML = '';
            
            if (room.readings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:gray; padding:10px;">暫無抄表紀錄</td></tr>`;
                return;
            }
            let sortedReadings = [...room.readings].sort((a, b) => new Date(a.date) - new Date(b.date));
            let displayReadings = [];
            for (let i = 0; i < sortedReadings.length; i++) {
                let current = sortedReadings[i];
                let consumed = "-"; let cost = "-";
                if (i > 0) {
                    let previous = sortedReadings[i - 1];
                    let diff = current.value - previous.value;
                    consumed = diff >= 0 ? diff.toFixed(1) : "度數異常";
                    cost = diff >= 0 ? Math.round(diff * ELECTRICITY_RATE) : "-";
                }
                displayReadings.unshift({ date: current.date, value: current.value, consumed: consumed, cost: cost });
            }
            
            const isLocked = isCurrentMonthLocked();
            displayReadings.forEach(r => {
                const tr = document.createElement('tr');
                let actionButtons = isLocked ? `<span style="color:gray; font-size:12px;">鎖定</span>` : `
                    <button onclick="editMeterReading('${r.date}', ${r.value})" style="padding:4px 8px; font-size:12px;">改</button>
                    <button onclick="deleteMeterReading('${r.date}')" class="btn-danger" style="padding:4px 8px; font-size:12px;">刪</button>
                `;
                tr.innerHTML = `<td>${r.date}</td><td>${r.value}</td><td>${r.consumed}</td><td>${r.cost !== "-" ? r.cost + ' 元' : '-'}</td>
                <td>${actionButtons}</td>`;
                tbody.appendChild(tr);
            });
        }

        function calculateMonthlyBilling() {
            const currentYearMonth = selectedReportMonth; 
            let totalDaysInMonth = 30;
            if(currentYearMonth.endsWith("-05") || currentYearMonth.endsWith("-07") || currentYearMonth.endsWith("-08")) {
                totalDaysInMonth = 31;
            }
            
            let structuredRows = []; 
            let totalElectricityCost = 0; let totalMgmtFee = 0; let totalGrandAmount = 0; let totalDeferredAmount = 0;

            let floorColorIdx = 0;
            Object.keys(ALL_FLOORS).forEach(floorName => {
                structuredRows.push({ isHeader: true, title: floorName });
                
                ALL_FLOORS[floorName].forEach(roomId => {
                    const room = rooms[roomId];
                    if (!room) return;

                    let consumed = 0; let elecCost = 0;
                    let sortedReadings = [...(room.readings || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
                    let targetIdx = sortedReadings.findIndex(r => r.date && r.date.startsWith(currentYearMonth));
                    if (targetIdx !== -1) {
                        let currentReading = sortedReadings[targetIdx];
                        if (targetIdx > 0) {
                            let prevReading = sortedReadings[targetIdx - 1];
                            let diff = currentReading.value - prevReading.value;
                            if (diff > 0) { consumed = diff; elecCost = Math.round(diff * ELECTRICITY_RATE); }
                        }
                    }

                    let mgmtFee = 0;
                    let typeLabel = (roomId.includes("公共區域") || roomId.includes("公共開放區域")) ? "公共開放區域" : "（空房）";
                    let skipMgmt = false;
                    if(room.name && room.isBookingFuture && room.checkInDate && room.checkInDate > `${currentYearMonth}-31`) {
                        skipMgmt = true;
                    }

                    if (room.isSpecialLock) {
                        typeLabel = "宿舍備品室";
                    } else if (roomId.includes("公共區域") || roomId.includes("公共開放區域")) {
                        typeLabel = "公共開放區域";
                    } else if (room.isTemp) {
                        typeLabel = `${room.name}(臨時入住)`;
                    } else if (room.name && !skipMgmt) {
                        let baseMonthlyFee = configParams.mgmtFee || 1600;
                        if (roomId === "5-1") baseMonthlyFee = configParams.suiteFee || 2400;
                        if (room.isWarehouse || room.isLeaveRetention) baseMonthlyFee = configParams.whFee || 500;
                        if (room.isSecurityOnly || room.isWarden) baseMonthlyFee = 0;

                        let startDay = 1; let endDay = totalDaysInMonth;
                        if (room.checkInDate && room.checkInDate.startsWith(currentYearMonth)) {
                            startDay = parseInt(room.checkInDate.split("-")[2]) || 1;
                        }
                        if (room.leaveDate && room.leaveDate.startsWith(currentYearMonth)) {
                            endDay = parseInt(room.leaveDate.split("-")[2]) || totalDaysInMonth;
                        }

                        let activeDays = endDay - startDay + 1;
                        if (activeDays < 0) activeDays = 0;
                        if (activeDays > totalDaysInMonth) activeDays = totalDaysInMonth;

                        mgmtFee = Math.round(baseMonthlyFee * (activeDays / totalDaysInMonth));

                        let statusLabel = room.name;
                        if (room.hasRoommate && room.roommateName) statusLabel += `+${room.roommateName}(同住)`;
                        if (room.isWarden) statusLabel += "(舍監免收)";
                        if (room.isWarehouse && !room.isLeaveRetention) statusLabel += "(倉庫)";
                        if (room.isSecurityOnly) statusLabel += "(保全免收)";
                        if (room.isLeaveRetention) statusLabel += `(${room.leaveRetentionReason}留停房)`;
                        
                        if (activeDays < totalDaysInMonth) {
                            typeLabel = `${statusLabel} [住${activeDays}天]`;
                        } else {
                            typeLabel = statusLabel;
                        }
                    } else if (room.name && room.isBookingFuture) {
                        typeLabel = `📅 預約房客:${room.name}`;
                    } else if (room.isDriverOnly) {
                        typeLabel = "司領房(空)";
                    }

                    let rawTotal = elecCost + mgmtFee;
                    const deferKey = `${currentYearMonth}_${roomId}`;
                    const isDeferred = configParams.deferredPayment && configParams.deferredPayment[deferKey] === true;
                    
                    let finalTotal = rawTotal;
                    if (isDeferred) {
                        totalDeferredAmount += rawTotal;
                        finalTotal = 0;
                    } else {
                        totalElectricityCost += elecCost;
                        totalMgmtFee += mgmtFee;
                        totalGrandAmount += finalTotal;
                    }

                    structuredRows.push({
                        isHeader: false,
                        floorClass: `floor-group-${floorColorIdx}`,
                        id: roomId,
                        name: typeLabel,
                        consumed: consumed > 0 ? consumed.toFixed(1) : "-",
                        elecCost: elecCost,
                        mgmtFee: mgmtFee,
                        total: finalTotal,
                        rawTotal: rawTotal,
                        isDeferred: isDeferred,
                        deferKey: deferKey
                    });
                });
                floorColorIdx++;
            });

            return { structuredRows, totalElectricityCost, totalMgmtFee, totalGrandAmount, totalDeferredAmount };
        }

        function renderSummaryTableData() {
            const tbody = document.querySelector('#summary-table tbody');
            if(!tbody) return; tbody.innerHTML = '';
            const { structuredRows, totalElectricityCost, totalMgmtFee, totalGrandAmount, totalDeferredAmount } = calculateMonthlyBilling();
            const isLocked = isCurrentMonthLocked();

            structuredRows.forEach(row => {
                if(row.isHeader) {
                    const trHead = document.createElement('tr');
                    trHead.innerHTML = `<td colspan="7" class="floor-row-header">📍 ${row.title} 房間清冊段落</td>`;
                    tbody.appendChild(trHead);
                } else {
                    const tr = document.createElement('tr');
                    tr.className = row.floorClass;
                    
                    let totalDisplay = row.total > 0 ? row.total + ' 元' : '-';
                    if(row.isDeferred) {
                        totalDisplay = `<span style="background:#fff59d; padding:2px 6px; border-radius:4px; font-weight:bold; color:#b71c1c;">0 元 (延下期: ${row.rawTotal}元)</span>`;
                    }

                    let checkboxHtml = '';
                    if(!row.id.includes("公共區域") && !row.id.includes("公共開放區域")) {
                        if(isLocked) {
                            checkboxHtml = `<span style="color:#777; font-size:12px;">${row.isDeferred ? '🔒 費用延下期' : '🔒 已完成收費'}</span>`;
                        } else {
                            checkboxHtml = `<select onchange="toggleDeferPayment('${row.deferKey}', this)" style="margin:0; padding:2px; font-size:12px; width:auto;">
                                <option value="PAID" ${!row.isDeferred ? 'selected' : ''}>已完成收費</option>
                                <option value="DEFER" ${row.isDeferred ? 'selected' : ''}>費用延至下期</option>
                            </select>`;
                        }
                    }

                    tr.innerHTML = `
                        <td><b>${row.id}</b></td>
                        <td>${row.name}</td>
                        <td>${row.consumed}</td>
                        <td>${row.elecCost > 0 ? row.elecCost + ' 元' : '-'}</td>
                        <td>${row.mgmtFee > 0 ? row.mgmtFee + ' 元' : '-'}</td>
                        <td style="font-weight: bold; color: ${row.total > 0 ? '#a11b00' : 'gray'};">${totalDisplay}</td>
                        <td>${checkboxHtml}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            const totalTr = document.createElement('tr');
            totalTr.style.backgroundColor = '#fff9bd'; totalTr.style.fontWeight = 'bold';
            totalTr.innerHTML = `<td colspan="2">本月實收總計</td><td>-</td><td style="color:#1e7a45;">${totalElectricityCost} 元</td><td style="color:#1e7a45;">${totalMgmtFee} 元</td><td style="color:#a11b00; font-size:16px;">${totalGrandAmount} 元</td><td>-</td>`;
            tbody.appendChild(totalTr);

            if(totalDeferredAmount > 0) {
                const deferTr = document.createElement('tr');
                deferTr.style.backgroundColor = '#ffebee'; deferTr.style.fontWeight = 'bold';
                deferTr.innerHTML = `<td colspan="5" style="text-align:right; color:#c62828;">⚠️ 本月遞延（應收未收）總計：</td><td style="color:#c62828; font-size:15px;">${totalDeferredAmount} 元</td><td style="color:gray; font-size:12px;">將併入下期對帳</td>`;
                tbody.appendChild(deferTr);
            }
        }

        async function toggleDeferPayment(deferKey, selectEl) {
            if(isCurrentMonthLocked()) return;
            if(!configParams.deferredPayment) configParams.deferredPayment = {};
            configParams.deferredPayment[deferKey] = (selectEl.value === 'DEFER');

            await saveToCloud();
        }

        function exportSummaryCSV() {
            const { structuredRows, totalElectricityCost, totalMgmtFee, totalGrandAmount, totalDeferredAmount } = calculateMonthlyBilling();
            let csvContent = "\uFEFF房間,行政項目與現況,本月用電 (度),本月電費,當月管理費,應收總額,狀態\n";
            structuredRows.forEach(row => { 
                if(!row.isHeader) {
                    let statusStr = row.isDeferred ? "費用延至下期" : "已完成收費";
                    csvContent += `${row.id},${row.name},${row.consumed},${row.elecCost},${row.mgmtFee},${row.total},${statusStr}\n`; 
                }
            });
            csvContent += `本月實收總計,,-,${totalElectricityCost},${totalMgmtFee},${totalGrandAmount},-\n`;
            csvContent += `本月遞延應收總計,,,,,,${totalDeferredAmount}\n`;
            const link = document.createElement("a"); link.setAttribute("href", URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' })));
            link.setAttribute("download", `宿舍_${selectedReportMonth}_行政財務精算清冊.csv`); link.click();
        }

        function showApplyStayModal() {
            const select = document.getElementById('apply-room'); if(!select) return;
            select.innerHTML = '';
            Object.keys(rooms).forEach(roomId => {
                if (!rooms[roomId].name && !roomId.includes("公共區域") && !roomId.includes("公共開放區域") && !rooms[roomId].isSpecialLock && !rooms[roomId].isDriverOnly) {
                    const option = document.createElement('option'); option.value = roomId; option.textContent = roomId; select.appendChild(option);
                }

            document.getElementById('apply-stay-modal').style.display = 'block';

        function toggleApplySpecialFields() {

        }

        async function submitApplyStay() {
            const roomId = document.getElementById('apply-room').value;
            const name = document.getElementById('apply-name').value.trim();
            const checkInDate = document.getElementById('apply-start-date').value;
            const specType = document.getElementById('apply-special-type').value;

            if (!roomId || !name || !checkInDate) { alert('請填寫完整資訊！'); return; }

            const room = rooms[roomId];
            room.name = name; room.checkInDate = checkInDate;
            room.isTemp = false; room.tempInfo = null; room.leaveDate = '';
            room.isWarehouse = false; room.isSecurityOnly = (roomId === "1-7"); room.hasRoommate = false; room.roommateName = ''; room.isLeaveRetention = false; room.isWarden = false;

            if(specType === 'WAREHOUSE') { room.isWarehouse = true; }
            else if(specType === 'WARDEN') { room.isWarden = true; }
            else if(specType === 'ROOMMATE') {
                const rmName = document.getElementById('apply-roommate-name').value.trim();
                if(!rmName) { alert("請輸入同住室友姓名！"); return; }
                room.hasRoommate = true; room.roommateName = rmName;
            }

            if(checkInDate > TODAY_STR) { room.isBookingFuture = true; } 
            else { room.isBookingFuture = false; }

            closeModal('apply-stay-modal');

        function showTempStayModal() {
            const select = document.getElementById('temp-room'); if(!select) return;
            select.innerHTML = '';
            Object.keys(rooms).forEach(roomId => {
                if (!rooms[roomId].isSpecialLock && (!rooms[roomId].name || rooms[roomId].isTemp) && !roomId.includes("公共區域") && !roomId.includes("公共開放區域")) {

                    option.textContent = rooms[roomId].isDriverOnly ? `${roomId} (司領房專用)` : roomId;

            document.getElementById('temp-applicant').value = ''; document.getElementById('temp-name').value = '';
            document.getElementById('temp-same-person').checked = false;
            document.getElementById('temp-start-date').value = TODAY_STR;
            document.getElementById('temp-end-date').value = "2026-06-28";
            document.getElementById('temp-reason-select').selectedIndex = 0;

        function showSpecialRequestModal() {
            const select = document.getElementById('sr-room'); if(!select) return;
            select.innerHTML = '';
            let count = 0;
            Object.keys(rooms).forEach(roomId => {
                if(rooms[roomId].name && !rooms[roomId].isSpecialLock && !roomId.includes("公共區域") && !roomId.includes("公共開放區域")) {
                    const option = document.createElement('option'); option.value = roomId; option.textContent = `${roomId} - ${rooms[roomId].name}`; select.appendChild(option);
                    count++;
                }

            if(count === 0) { alert("目前暫無正式入住的房客可供變更狀態！"); return; }
            document.getElementById('sr-type').selectedIndex = 0;
            toggleSpecialRequestFields();
            document.getElementById('special-request-modal').style.display = 'block';
        }

        function toggleSpecialRequestFields() {
            const type = document.getElementById('sr-type').value;
            document.getElementById('sr-roommate-box').style.display = (type === 'ROOMMATE') ? 'block' : 'none';
            document.getElementById('sr-leave-box').style.display = (type === 'LEAVE_RETENTION') ? 'block' : 'none';
            if(type === 'LEAVE_RETENTION') { calculateRetentionFeePreview(); }
        }

        function calculateRetentionFeePreview() {
            const startStr = document.getElementById('sr-leave-start').value;
            const endStr = document.getElementById('sr-leave-end').value;
            const previewBox = document.getElementById('retention-calc-box');
            if(!startStr || !endStr || !previewBox) return;

            const start = new Date(startStr); const end = new Date(endStr);
            if(end < start) { previewBox.innerHTML = "❌ 錯誤：結束日期不得早於開始日期。"; return; }

            let totalPrepaid = 0;
            let current = new Date(start.getFullYear(), start.getMonth(), 1);
            let detailLines = [];
            let whFeeBase = configParams.whFee || 500;

            while (current <= end) {
                let yr = current.getFullYear();
                let mo = String(current.getMonth() + 1).padStart(2, '0');
                let mKey = `${yr}-${mo}`;
                
                let daysInMonth = new Date(yr, current.getMonth() + 1, 0).getDate();
                
                let sDay = 1; let eDay = daysInMonth;
                if (start.getFullYear() === yr && (start.getMonth() + 1) === parseInt(mo)) { sDay = start.getDate(); }
                if (end.getFullYear() === yr && (end.getMonth() + 1) === parseInt(mo)) { eDay = end.getDate(); }
                
                let activeDays = eDay - sDay + 1;
                if (activeDays < 0) activeDays = 0;
                
                let portionFee = Math.round(whFeeBase * (activeDays / daysInMonth));
                totalPrepaid += portionFee;
                
                detailLines.push(`• ${mKey}月份: 計 ${activeDays} 天，比例預收 $${portionFee}`);
                current.setMonth(current.getMonth() + 1);
            }

            previewBox.innerHTML = `
                <b>💰 留停保留費試算結果 (按倉庫費 $${whFeeBase}/月 切算)：</b><br>
                ${detailLines.join('<br>')}<br>
                <hr style="border:0; border-top:1px dashed #ffe0b2;">
                <b>應預收管理費總計：<span style="font-size:16px; font-weight:bold; color:#d2322d;">${totalPrepaid}</span> 元</b>
            `;
            previewBox.dataset.computedFee = totalPrepaid;
        }

        async function submitSpecialRequest() {
            const roomId = document.getElementById('sr-room').value;
            const type = document.getElementById('sr-type').value;
            if(!roomId) return;

            const room = rooms[roomId];
            room.isWarehouse = false; room.isSecurityOnly = false; room.hasRoommate = false; room.roommateName = ''; room.isLeaveRetention = false; room.leaveRetentionReason = ''; room.isWarden = false;
            room.leaveRetentionStart = ''; room.leaveRetentionEnd = ''; room.leaveRetentionPrepaid = 0;

            if(type === 'WAREHOUSE') { room.isWarehouse = true; } 
            else if(type === 'SECURITY') { room.isSecurityOnly = true; } 
            else if(type === 'WARDEN') { room.isWarden = true; } 
            else if(type === 'ROOMMATE') {
                const rName = document.getElementById('sr-roommate-name').value.trim();
                if(!rName) { alert("請輸入室友姓名！"); return; }
                room.hasRoommate = true; room.roommateName = rName;
            } else if(type === 'LEAVE_RETENTION') {
                room.isLeaveRetention = true; 
                room.leaveRetentionReason = document.getElementById('sr-leave-reason').value;
                room.leaveRetentionStart = document.getElementById('sr-leave-start').value;
                room.leaveRetentionEnd = document.getElementById('sr-leave-end').value;
                
                let feeVal = parseInt(document.getElementById('retention-calc-box').dataset.computedFee) || 0;
                room.leaveRetentionPrepaid = feeVal;
                alert(`房客已成功轉為留職停薪保留狀態，本案現場行政應預收：${feeVal} 元。`);
            }
            closeModal('special-request-modal');
            switchRoom(roomId);
            await saveToCloud();
        }

        function syncTempName() {
            if(document.getElementById('temp-same-person').checked) {
                document.getElementById('temp-name').value = document.getElementById('temp-applicant').value;
            }
        }

        function toggleTempReasonOther() {
            document.getElementById('temp-reason-other-box').style.display = (document.getElementById('temp-reason-select').value === '其他') ? 'block' : 'none';
        }

        function showApplyLeaveModal() {
            const select = document.getElementById('leave-room'); if(!select) return;
            select.innerHTML = '';
            Object.keys(rooms).forEach(roomId => {
                if (rooms[roomId].name && !rooms[roomId].isSpecialLock) {
                    const option = document.createElement('option'); option.value = roomId; option.textContent = `${roomId} - ${rooms[roomId].name}`; select.appendChild(option);
                }
            });
            document.getElementById('leave-date').value = TODAY_STR;
            document.getElementById('apply-leave-modal').style.display = 'block';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function submitApplyLeave() {
            const roomId = document.getElementById('leave-room').value;
            const leaveDateInput = document.getElementById('leave-date').value;
            if (!roomId) return;

            if (leaveDateInput <= TODAY_STR) {
                rooms[roomId].name = ''; rooms[roomId].isWarehouse = false; rooms[roomId].leaveDate = '';
                rooms[roomId].isTemp = false; rooms[roomId].tempInfo = null; rooms[roomId].checkInDate = ''; rooms[roomId].isBookingFuture = false;
                rooms[roomId].isSecurityOnly = false; rooms[roomId].hasRoommate = false; rooms[roomId].roommateName = '';
                rooms[roomId].isLeaveRetention = false; rooms[roomId].leaveRetentionReason = ''; rooms[roomId].isWarden = false;
                alert(`房間 ${roomId} 資料已立刻執行退宿清除。`);
            } else {
                rooms[roomId].leaveDate = leaveDateInput;
                alert(`已預約退宿：將於未來 ${leaveDateInput} 自動清除。`);
            }
            closeModal('apply-leave-modal');
            switchRoom(roomId);
            await saveToCloud();
        }

        async function saveMeterReading() {
            if(isCurrentMonthLocked()) return;
            const date = document.getElementById('meter-date').value;
            const valueStr = document.getElementById('meter-reading').value;
            if (!valueStr) { alert("請輸入電表度數！"); return; }
            const value = parseFloat(valueStr);
            const existingIndex = rooms[currentActiveView].readings.findIndex(r => r.date === date);
            if (existingIndex !== -1) rooms[currentActiveView].readings[existingIndex].value = value;
            else rooms[currentActiveView].readings.push({ date: date, value: value });
            switchRoom(currentActiveView);
            await saveToCloud(); 
        }

        async function editMeterReading(date, oldValue) {
            if(isCurrentMonthLocked()) return;
            const newValueStr = prompt(`修改度數：`, oldValue);
            if (newValueStr === null) return;
            const newValue = parseFloat(newValueStr);
            if (isNaN(newValue)) { alert("請輸入數字！"); return; }
            const target = rooms[currentActiveView].readings.find(r => r.date === date);
            if (target) { target.value = newValue; switchRoom(currentActiveView); await saveToCloud(); }
        }

        async function deleteMeterReading(date) {
            if(isCurrentMonthLocked()) return;
            if (confirm(`確定要刪除這筆抄表紀錄嗎？`)) {
                rooms[currentActiveView].readings = rooms[currentActiveView].readings.filter(r => r.date !== date);
                switchRoom(currentActiveView); await saveToCloud(); 
            }
        }

        function exportData() {
            const packageData = { SYSTEM_ROOMS_DATA: rooms, SYSTEM_CONFIG: configParams };
            const link = document.createElement('a'); link.setAttribute('href', 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(packageData, null, 2)));
            link.setAttribute('download', `dorm_system_v24_1_${TODAY_STR}.json`); link.click();
        }

        function triggerImport() { document.getElementById('import-file').click(); }

        function importData(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.SYSTEM_ROOMS_DATA) {
                        rooms = imported.SYSTEM_ROOMS_DATA;
                        configParams = imported.SYSTEM_CONFIG || configParams;
                    } else { rooms = imported; }
                    initMissingRooms(); checkAndProcessDateStatus(); showDefaultHome(); await saveToCloud(); 
                } catch (err) { alert("檔案讀取失敗！"); }
            };
            reader.readAsText(file); input.value = '';
        }

        window.onload = function() { loadCloudData(); };
    </script>
