<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍管理系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f0e4;
            margin: 0;
            padding: 20px;
            color: #0f2a1f;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #0f4c2a, #1e7a45);
            color: white;
            padding: 20px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 28px;
        }
        .main-content {
            display: flex;
            flex-wrap: wrap;
        }
        .sidebar {
            width: 250px;
            background: #e6f0ea;
            padding: 20px;
            border-right: 1px solid #b0d4b8;
        }
        .content {
            flex: 1;
            padding: 30px;
        }
        .room-list {
            list-style: none;
            padding: 0;
        }
        .room-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: all 0.3s;
        }

        /* Accordion styles */
        .floor-header {
            padding: 12px 15px;
            background: #0f4c2a;
            color: white;
            font-weight: bold;
            margin: 10px 0 5px 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .floor-header:hover {
            background: #0a3a20;
        }
        .floor-content {
            display: none;
            padding-left: 10px;
        }
        .floor-content.open {
            display: block;
        }
        .room-item:hover, .room-item.active {
            background: #b0d4b8;
            border-color: #0f4c2a;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #1e7a45;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #0f4c2a;
        }
        .upload-area {
            border: 2px dashed #1e7a45;
            padding: 40px 20px;
            text-align: center;
            border-radius: 12px;
            background: #f1f8f3;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #c8e6c9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #d4e9d9;
            font-weight: 600;
        }
        .history {
            margin-top: 40px;
        }
        .alert {
            padding: 15px;
            background: #b0d4b8;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #0f4c2a;
        }
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
        }
    </style>
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 宿舍管理系統</h1>
            <p>電表抄表 • 入住管理 • 費用計算</p>
        </header>

        <!-- Sandbox 警告橫幅 -->
        <div id="sandbox-warning" style="background: #fff3cd; color: #856404; padding: 12px 20px; text-align: center; border-bottom: 1px solid #ffeaa7; display: none; font-size: 14px;">
            ⚠️ <strong>localStorage 無法使用</strong>（sandbox 環境）。資料暫存於記憶體，請務必使用「📤 匯出資料」備份！ 
            <button onclick="this.parentElement.style.display='none'" style="margin-left: 15px; background: #856404; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer;">知道了</button>
        </div>
        
        <div class="main-content">
            <!-- 側邊欄：宿舍列表 -->
            <div class="sidebar">
                <h3>宿舍房間列表</h3>
                <ul id="room-list" class="room-list">
                    <!-- JS 動態生成 -->
                </ul>
                <button onclick="addNewRoom()">+ 新增房間</button>
                
                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #ddd;">
                    <h4>💾 資料備份</h4>
                    <button onclick="exportData()" style="background: #1e7a45; margin-bottom: 8px;">📤 匯出資料 (JSON)</button>
                    <button onclick="document.getElementById('import-file').click()" style="background: #ff9800;">📥 匯入資料</button>
                    <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
                </div>
            </div>
            
            <!-- 主要內容 -->
            <div class="content">
                <div id="room-info">
                    <h2 id="current-room">請選擇房間</h2>
                    
                    <!-- 入住管理 -->
                    <div style="margin-bottom: 20px; padding: 15px; background: #f1f8f3; border-radius: 8px;">
                        <h3>👤 入住管理</h3>
                        <div class="form-group" style="display: flex; gap: 10px; align-items: end;">
                            <div style="flex: 1;">
                                <label>入住姓名</label>
                                <input type="text" id="resident-input" placeholder="輸入入住大名" style="width: 100%;">
                            </div>
                            <button onclick="updateResident()" style="width: auto; padding: 12px 20px;">更新</button>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div>
                                <label>入住日期</label>
                                <input type="date" id="checkin-date" style="width: 100%;">
                            </div>
                            <div>
                                <label>退宿日期</label>
                                <input type="date" id="checkout-date" style="width: 100%;">
                            </div>
                        </div>
                        
                        <div style="margin-top: 10px;">
                            <label>
                                <input type="checkbox" id="warehouse-checkbox" onchange="toggleWarehouse()">
                                申請作為倉庫 (每月 500 元)
                            </label>
                        </div>
                        <button onclick="saveResidentInfo()" style="margin-top: 10px; background: #1e7a45;">💾 儲存入住資訊</button>
                    </div>
                    
                    <div class="alert" id="next-reminder" style="display: none;">
                        下次抄表提醒： <span id="reminder-date"></span>
                    </div>
                </div>
                
                <!-- 費用總覽 -->
                <div id="fee-summary" style="margin-bottom: 25px; padding: 15px; background: #e8f5e9; border-radius: 8px; border-left: 5px solid #0f4c2a;">
                    <h3>💰 本月費用總覽（含電費）</h3>
                    <div id="fee-details"></div>
                </div>

                <!-- 上傳表單 -->
                <div id="upload-form">
                    <h3>📸 新增電表抄表</h3>
                    <div class="form-group">
                        <label>房間</label>
                        <select id="room-select" onchange="switchRoom(this.value)"></select>
                    </div>
                    
                    <div class="form-group">
                        <label>上傳電表照片</label>
                        <div class="upload-area" id="upload-area" onclick="document.getElementById('photo-upload').click()">
                            <p>📷 點擊上傳照片（支援 JPG/PNG）</p>
                            <input type="file" id="photo-upload" accept="image/*" style="display: none;" onchange="handlePhotoUpload(event)">
                        </div>
                        <div id="photo-preview" style="margin-top: 15px; display: none;">
                            <img id="preview-img" style="max-width: 100%; border-radius: 8px;" alt="預覽">
                            <button onclick="performOCR()" style="margin-top: 10px; background: #1e7a45;">🤖 OCR 自動辨識度數</button>
                            <div id="ocr-result" style="margin-top: 8px; font-weight: bold; color: #1e7a45;"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>本期電表度數 (kWh)</label>
                        <input type="number" id="reading" placeholder="例如: 12345.6" step="0.1">
                    </div>
                    
                    <div class="form-group">
                        <label>抄表日期</label>
                        <input type="date" id="reading-date" value="">
                    </div>
                    
                    <button onclick="submitReading()">✅ 儲存抄表紀錄</button>
                </div>
                
                <!-- 歷史紀錄 -->
                <div class="history">
                    <h3>📊 歷史抄表紀錄</h3>
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>度數 (kWh)</th>
                                <th>用電量 (kWh)</th>
                                <th>電費 (元)</th>
                                <th>照片</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- JS 填充 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

        // 嘗試從 localStorage 載入（如果可用）
        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('dormData');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    dormData.rooms = parsed.rooms || dormData.rooms;
                    dormData.readings = parsed.readings || dormData.readings;
                    console.log('✅ 已從 localStorage 恢復資料');
                }
            } catch (e) {
                console.warn('⚠️ localStorage 無法使用（sandbox 環境），資料將暫存於記憶體。請使用下方「匯出 / 匯入資料」功能手動備份！');
                // 顯示可關閉的警告橫幅
                const warning = document.getElementById('sandbox-warning');
                if (warning) warning.style.display = 'block';
            }
        }

        // 保存資料（嘗試 localStorage，失敗則只在記憶體）
        function saveData() {
            try {
                localStorage.setItem('dormData', JSON.stringify(dormData));
                console.log('✅ 資料已儲存至 localStorage');
            } catch (e) {
                console.warn('⚠️ localStorage 保存失敗，資料僅暫存在記憶體中（重新整理頁面會消失）。請點擊「匯出資料」備份！');
                // 確保警告顯示
                const warning = document.getElementById('sandbox-warning');
                if (warning) warning.style.display = 'block';
            }
        }

                { title: "公共區域", rooms: [30, 31, 32] }
            ];

            groups.forEach(group => {
                // 建立樓層標題 (可折疊)
                const header = document.createElement('div');
                header.className = 'floor-header';
                header.innerHTML = `${group.title} <span style="font-size:18px;">▼</span>`;
                header.onclick = () => {
                    const content = header.nextElementSibling;
                    content.classList.toggle('open');
                    const arrow = header.querySelector('span');
                    arrow.textContent = content.classList.contains('open') ? '▲' : '▼';
                };
                roomList.appendChild(header);

                // 建立該組房間內容
                const content = document.createElement('div');
                content.className = 'floor-content';
                if (group.title === "第一排") content.classList.add('open'); // 第一排預設展開

                group.rooms.forEach(roomId => {
                    const room = dormData.rooms.find(r => r.id === roomId);
                    if (!room) return;

                    // 房間列表項目
                    const li = document.createElement('li');
                    li.className = `room-item ${room.id === currentRoomId ? 'active' : ''}`;
                    
                    let displayName = `${room.name} (空房)`;
                    if (room.resident) {
                        if (room.isWarehouse) {
                            displayName = `${room.name} (${room.resident}-倉庫)`;
                        } else {
                            displayName = `${room.name} (${room.resident})`;
                        }
                    }
                    li.textContent = displayName;
                    li.onclick = () => switchRoom(room.id);
                    content.appendChild(li);

                    // 下拉選單選項
                    const option = document.createElement('option');
                    option.value = room.id;
                    option.textContent = displayName;
                    if (room.id === currentRoomId) option.selected = true;
                    roomSelect.appendChild(option);
                });

                roomList.appendChild(content);
            });
        }
        
        // 切換房間
        function switchRoom(roomId) {
            currentRoomId = parseInt(roomId);
            renderRooms();
            loadRoomData();
        }
        
        // 載入房間資料
        function loadRoomData() {
            const room = dormData.rooms.find(r => r.id === currentRoomId);
            let title = room.name + " 管理";
            if (room.resident) {
                if (room.isWarehouse) {
                    title = `${room.name} (${room.resident}-倉庫)`;
                } else {
                    title = `${room.name} (${room.resident})`;
                }
            }
            document.getElementById('current-room').textContent = title + " 管理";
            
            // 載入入住資訊
            document.getElementById('resident-input').value = room.resident || '';
            document.getElementById('checkin-date').value = room.checkInDate || '';
            document.getElementById('checkout-date').value = room.checkOutDate || '';
            document.getElementById('warehouse-checkbox').checked = !!room.isWarehouse;
            
            // 顯示費用總覽
            renderFeeSummary(room);
            
            // 顯示提醒
            const reminderEl = document.getElementById('next-reminder');
            if (room.lastDate) {
                const last = new Date(room.lastDate);
                const next = new Date(last);
                next.setMonth(next.getMonth() + 2);
                const nextStr = next.toISOString().split('T')[0];
                document.getElementById('reminder-date').textContent = nextStr;
                reminderEl.style.display = 'block';
            } else {
                reminderEl.style.display = 'none';
            }
            
            renderHistory();
        }
        
        // 處理照片上傳
        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('photo-preview');
                const img = document.getElementById('preview-img');
                img.src = e.target.result;
                preview.style.display = 'block';
                
                // 暫存圖片 base64
                window.currentPhoto = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        // OCR 自動辨識
        async function performOCR() {
            const previewImg = document.getElementById('preview-img');
            const ocrResult = document.getElementById('ocr-result');
            
            if (!previewImg.src || previewImg.src === '') {
                alert('請先上傳電表照片！');
                return;
            }
            
            ocrResult.textContent = '🔄 正在辨識中...（首次載入較慢）';
            
            try {
                // 建立 worker，只辨識數字
                const worker = await Tesseract.createWorker('eng', 1, {
                    logger: m => console.log(m)
                });
                
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789.',
                    tessedit_pageseg_mode: '7'  // Treat the image as a single text line
                });
                
                const { data: { text } } = await worker.recognize(previewImg);
                await worker.terminate();
                
                // 清理結果，只取數字和小數點
                const cleanedText = text.replace(/[^0-9.]/g, '').trim();
                const numberMatch = cleanedText.match(/\d+\.?\d*/);
                
                if (numberMatch) {
                    const recognizedNumber = parseFloat(numberMatch[0]);
                    document.getElementById('reading').value = recognizedNumber;
                    ocrResult.innerHTML = `✅ 辨識成功： <strong>${recognizedNumber}</strong> kWh<br><small>可手動修正</small>`;
                } else {
                    ocrResult.textContent = '⚠️ 未辨識到有效度數，請手動輸入或重試。';
                }
            } catch (error) {
                console.error(error);
                ocrResult.textContent = '❌ OCR 辨識失敗，請手動輸入度數。';
            }
        }
        
        // 提交抄表
        function submitReading() {
            const readingInput = document.getElementById('reading').value;
            const dateInput = document.getElementById('reading-date').value;
            
            if (!readingInput || !dateInput) {
                alert('請填寫度數和日期！');
                return;
            }
            
            const newReading = {
                date: dateInput,
                reading: parseFloat(readingInput),
                photo: window.currentPhoto || 'https://via.placeholder.com/300x200?text=No+Photo'
            };
            
            if (!dormData.readings[currentRoomId]) {
                dormData.readings[currentRoomId] = [];
            }
            
            dormData.readings[currentRoomId].unshift(newReading); // 最新在最前面
            
            // 更新最後一次抄表
            const room = dormData.rooms.find(r => r.id === currentRoomId);
            room.lastReading = newReading.reading;
            room.lastDate = dateInput;
            
            // 保存資料
            saveData();
            
            alert('抄表紀錄已儲存！');
            
            // 重置表單
            document.getElementById('reading').value = '';
            document.getElementById('photo-preview').style.display = 'none';
            window.currentPhoto = null;
            
            renderHistory();
            loadRoomData();
        }
        
        // 渲染歷史 - 已包含電費計算
        function renderHistory() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            
            const readings = dormData.readings[currentRoomId] || [];
            
            readings.forEach(record => {
                const index = readings.indexOf(record);
                const prevReading = readings[index + 1];
                let usage = prevReading ? (record.reading - prevReading.reading) : 0;
                let elecFee = 0;
                
                if (usage > 0) {
                    const ceilingUsage = Math.ceil(usage);
                    elecFee = ceilingUsage * 5;
                }
                
                const usageDisplay = prevReading ? usage.toFixed(1) : '-';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${record.date}</td>
                    <td>${record.reading}</td>
                    <td>${usageDisplay}</td>
                    <td>${elecFee} 元</td>
                    <td><img src="${record.photo}" style="max-width: 80px; border-radius: 4px;" onclick="showFullImage(this.src)"></td>
                `;
                tbody.appendChild(tr);
            });
            
            if (readings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">尚無抄表紀錄</td></tr>`;
            }
        }
        
        function showFullImage(src) {
            const win = window.open();
            win.document.write(`<img src="${src}" style="max-width:100%;">`);
        }
        
        // 新增房間
        function addNewRoom() {
            const name = prompt('請輸入新房間名稱（如 B305）：');
            if (!name) return;
            
            const newId = Math.max(0, ...dormData.rooms.map(r => r.id)) + 1;
            
            dormData.rooms.push({
                id: newId,
                name: name,
                resident: "",
                checkInDate: "",
                checkOutDate: "",
                isWarehouse: false,
                lastReading: 0,
                lastDate: null
            });
            
            saveData();
            renderRooms();
            switchRoom(newId);
        }

        // 更新入住姓名 (舊版，保留相容)
        function updateResident() {
            const residentName = document.getElementById('resident-input').value.trim();
            const room = dormData.rooms.find(r => r.id === currentRoomId);
            if (room) {
                room.resident = residentName;
                saveData();
                loadRoomData();
                renderRooms();
                alert('入住姓名已更新！');
            }
        }

        // 儲存完整入住資訊 (包含日期與倉庫)
        function saveResidentInfo() {
            const room = dormData.rooms.find(r => r.id === currentRoomId);
            if (!room) return;

            room.resident = document.getElementById('resident-input').value.trim();
            room.checkInDate = document.getElementById('checkin-date').value;
            room.checkOutDate = document.getElementById('checkout-date').value;
            room.isWarehouse = document.getElementById('warehouse-checkbox').checked;

            saveData();
            loadRoomData();
            renderRooms();
            alert('✅ 入住資訊已儲存！');
        }

        // 切換倉庫模式
        function toggleWarehouse() {
            // 即時更新顯示，但不儲存 (等按儲存按鈕)
        }

        // 渲染費用總覽 - 已整合電費自動計算
        function renderFeeSummary(room) {
            const feeDiv = document.getElementById('fee-details');
            const monthlyMgmt = 1600;
            let totalFee = monthlyMgmt;
            let electricityFee = 0;
            let usage = 0;

            // 計算最新電費 (從最近兩筆抄表)
            const readings = dormData.readings[room.id] || [];
            if (readings.length >= 2) {
                const latest = readings[0];
                const prev = readings[1];
                usage = (latest.reading - prev.reading);
                const ceilingUsage = Math.ceil(usage);
                electricityFee = ceilingUsage * 5;
            } else if (readings.length === 1) {
                // 首次抄表，暫估用電或顯示待計算
                electricityFee = 0;
            }

            if (room.isWarehouse) {
                totalFee += 500;
            }
            totalFee += electricityFee;

            let html = `<p><strong>每月管理費：</strong> ${monthlyMgmt} 元</p>`;

            if (room.isWarehouse) {
                html += `<p><strong>倉庫使用費：</strong> 500 元</p>`;
            }

            html += `<p><strong>本期電費：</strong> ${electricityFee} 元`;
            if (usage > 0) html += ` <small>(${Math.ceil(usage)} 度 × 5元)</small>`;
            html += `</p>`;

            html += `<p style="font-size:20px; color:#0f4c2a; margin-top:15px; border-top:2px solid #0f4c2a; padding-top:10px;">
                        <strong>本月總費用：</strong> ${totalFee} 元
                     </p>`;
            
            feeDiv.innerHTML = html;
        }

        // 匯出資料為 JSON
        function exportData() {
            const dataStr = JSON.stringify(dormData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `dorm_electricity_backup_${new Date().toISOString().slice(0,10)}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            alert('✅ 資料已匯出！請妥善保存 JSON 檔案。');
        }

        // 匯入資料
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.rooms && imported.readings) {
                        dormData = imported;
                        saveData(); // 嘗試保存
                        renderRooms();
                        switchRoom(currentRoomId);
                        alert('✅ 資料匯入成功！');
                    } else {
                        alert('❌ 檔案格式錯誤，請使用正確的備份 JSON。');
                    }
                } catch (err) {
                    alert('❌ 匯入失敗：' + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        // 初始化
        function init() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('reading-date').value = today;
            
            loadFromLocalStorage();
            
            renderRooms();
            switchRoom(1);
        }
        
        window.onload = init;
    </script>
</body>
