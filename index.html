<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍管理系統 (雲端同步版)</title>
    <style>
        :root { --main-green: #0f4c2a; --accent-green: #1e7a45; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e0f0e4; margin: 0; padding: 0; color: #0f2a1f; }
        
        nav { background: linear-gradient(135deg, var(--main-green), var(--accent-green)); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 101; }
        nav h1 { margin: 0; font-size: 20px; cursor: pointer; }
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 10px; margin: 0; }

        .container { max-width: 1200px; margin: 0 auto; background: white; min-height: 100vh; display: flex; position: relative; }
        
        .sidebar { width: 320px; background: #e6f0ea; padding: 15px; border-right: 1px solid #b0d4b8; box-sizing: border-box; transition: transform 0.3s ease; z-index: 100; }
        .content { flex: 1; padding: 20px; min-width: 300px; position: relative; box-sizing: border-box; }
        
        .floor-header { padding: 12px 15px; background: var(--main-green); color: white; font-weight: bold; margin: 8px 0 4px; border-radius: 8px; cursor: pointer; }
        .floor-content { display: block; }
        
        .room-item { padding: 12px 15px; margin: 4px 0; background: white; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; font-size: 15px; }
        .room-item.empty-room { background: #f2f2f2; color: #777; }
        .room-item:hover, .room-item.active { background: #b0d4b8 !important; color: #0f2a1f !important; }
        
        .tag { font-size: 11px; padding: 2px 6px; border-radius: 12px; margin-left: 5px; color: white; display: inline-block; font-weight: normal; vertical-align: middle; }
        .tag-warehouse { background: #ff9800; }
        .tag-leave { background: #666666; }
        .tag-temp { background: #2196F3; }
        .tag-special { background: #7e57c2; }
        .tag-booking { background: #e91e63; }
        .tag-leave-status { background: #e65100; }
        .tag-warden { background: #009688; }
        
        button { padding: 12px 16px; border: none; border-radius: 6px; background: var(--accent-green); color: white; cursor: pointer; margin: 5px 2px; font-size: 15px; }
        button:hover { background: #0f4c2a; }
        .btn-danger { background-color: #d9534f; }
        .btn-danger:hover { background-color: #c9302c; }
        .sidebar button { width: 100%; margin: 5px 0; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1002; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 480px; border-radius: 12px; position: relative; box-sizing: border-box; max-height: 85vh; overflow-y: auto; }
        .close { position: absolute; top: 10px; right: 20px; font-size: 32px; cursor: pointer; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin: 6px 0 12px 0; box-sizing: border-box; font-size: 15px; width: 100%; }
        
        #meter-section { background: #f4fdf7; padding: 15px; border-radius: 8px; border: 1px solid #b0d4b8; margin-bottom: 20px; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1005; text-align: center; padding-top: 200px; font-size: 18px; font-weight: bold; color: var(--main-green); }
        
        .table-responsive { width: 100%; max-height: 75vh; overflow-y: auto; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; margin-bottom: 30px; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 800px; }
        
        thead th { position: sticky; top: 0; background-color: var(--main-green); color: white; z-index: 10; padding: 12px 6px; font-size: 14px; border: 1px solid #ddd; }
        td { padding: 10px 6px; font-size: 14px; border: 1px solid #ddd; }
        
        .floor-group-0 { background-color: #ffffff; }
        .floor-group-1 { background-color: #f7faf8; }
        .floor-group-2 { background-color: #edf5ef; }
        .floor-group-3 { background-color: #e3efe6; }
        .floor-group-4 { background-color: #d8eada; }
        .floor-group-5 { background-color: #fcfcfc; }
        .floor-row-header { font-weight: bold; background-color: #e2ede4 !important; border-top: 2px solid var(--main-green); text-align: left; padding-left: 12px; }
        .floor-row-header td { position: sticky; z-index: 5; }

        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99; }

        .bill-summary-box { background: #fffde6; padding: 20px; border-radius: 8px; border: 1px solid #e6db55; margin-top: 10px; }
        .setting-panel { background: #f0f4f1; padding: 12px; border-radius: 8px; border: 1px solid #cbdcd0; margin-top: 15px; font-size: 14px; }
        .setting-panel input { padding: 6px; margin: 4px 0 8px 0; font-size: 13px; }
        
        .history-log-box { font-size: 12px; max-height: 100px; overflow-y: auto; background: white; padding: 6px; border: 1px solid #ccc; margin-top: 8px; border-radius: 4px; text-align: left; }
        .calc-preview { font-size: 13px; background: #fff3e0; padding: 10px; border-radius: 6px; border: 1px solid #ffe0b2; margin: 10px 0; color: #e65100; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; top: 58px; left: 0; height: calc(100vh - 58px); transform: translateX(-100%); overflow-y: auto; box-shadow: 4px 0 10px rgba(0,0,0,0.1); background: #f4fbf7; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .content { padding: 15px; width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h1>🏠 宿舍管理系統 (v38.4-歷史履歷穩定版) </h1>
        <div style="width:10px;"></div>
    </nav>

    <div class="container">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>

        <div class="sidebar" id="sidebar">
            <button onclick="showDefaultHome()" style="background: #2a6e45; font-weight:bold; padding: 12px; font-size: 15px; margin-bottom: 12px; border: 1px solid #fff;">📊 顯示總體財務清冊</button>
            <hr style="margin-top:0;">
            
            <h3>宿舍入住管理</h3>
            <button onclick="showApplyStayModal()">長期入住申請</button>
            <button onclick="showTempStayModal()" style="background-color: #2196F3;">臨時入住申請</button>
            <button onclick="showTempStayList()" style="background-color: #01579b; font-size: 14px; padding: 8px 12px;">📋 檢視臨時入住預約清單</button>
            <button onclick="showSpecialRequestModal()" style="background-color: #7e57c2;">✨ 特殊需求申請</button>
            <button onclick="showApplyLeaveModal()">申請退宿清除</button>
            <hr>
            
            <h3>房間列表</h3>
            <div id="room-list"></div>
            <hr>
            
            <div class="setting-panel">
                <b style="color: var(--main-green);">⚙️ 費率變更與實施設定</b>
                <label style="display:block; margin-top:6px;">一般月管理費：<input type="number" id="cfg-mgmt-fee" value="1600"></label>
                <label style="display:block;">倉庫月管理費：<input type="number" id="cfg-wh-fee" value="500"></label>
                <label style="display:block;">5-1套房管理費：<input type="number" id="cfg-suite-fee" value="2400"></label>
                <label style="display:block;">實施公告日期：<input type="date" id="cfg-effective-date" value="2026-07-01"></label>
                <button onclick="saveConfigParams()" style="width:100%; padding:6px; font-size:13px; background:#4caf50; margin-top:4px;">套用並記錄新費率</button>
                
                <div style="margin-top:10px; font-weight:bold; color:#555;">📋 費率變更歷史：</div>
                <div class="history-log-box" id="rate-history-log">暫無歷史變更紀錄</div>
            </div>
            
            <button onclick="exportData()" style="background-color: #666; font-size: 12px; padding: 6px;">📤 匯出系統備份</button>
            <button onclick="triggerImport()" style="background-color: #666; font-size: 12px; padding: 6px;">📥 匯入系統備份</button>
            <input type="file" id="import-file" style="display:none" onchange="importData(this)">
        </div>

        <div class="content">
            <div id="loading-overlay">⏳ 雲端資料同步中...</div>
            <div id="main-display-area"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="apply-stay-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-stay-modal')">×</span>
            <h2>長期入住申請</h2>
            <label>選擇房間：</label>
            <select id="apply-room"></select>
            <input type="text" id="apply-name" placeholder="入住姓名">
            <label>入住開始日期：</label>
            <input type="date" id="apply-start-date" value="2026-07-01">
            
            <label>房客特定身分 / 特殊需求：</label>
            <select id="apply-special-type" onchange="toggleApplySpecialFields()">
                <option value="NORMAL">常規常駐狀態 (依房型收費)</option>
                <option value="WAREHOUSE">申請作為倉庫 (改按倉庫費計收)</option>
                <option value="WARDEN">申請作為舍監房 (管理費免收)</option>
                <option value="SECURITY">申請作為保全夜宿房 (管理費免收)</option>
                <option value="ROOMMATE">申請同住狀態 (維持原費率，有同住者)</option>
            </select>
            <div id="apply-roommate-box" style="display:none;">
                <label>請輸入同住室友姓名：</label>
                <input type="text" id="apply-roommate-name" placeholder="請輸入共同入住者姓名">
            </div>
            <button onclick="submitApplyStay()" style="width:100%; margin-top:15px;">送出申請</button>
        </div>
    </div>

    <div id="temp-stay-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('temp-stay-modal')">×</span>
            <h2>臨時入住申請</h2>
            <label>選擇房間：</label>
            <select id="temp-room"></select>
            <label>申請人姓名：</label>
            <input type="text" id="temp-applicant" placeholder="請輸入申請人" oninput="syncTempName()">
            <label style="display:block; margin: 5px 0;">
                <input type="checkbox" id="temp-same-person" onchange="syncTempName()"> 住宿大名同申請人
            </label>
            <label>住宿大名：</label>
            <input type="text" id="temp-name" placeholder="請輸入實際住宿者姓名">
            <label>入住人數：</label>
            <input type="number" id="temp-count" value="1" min="1">
            <label>預計入住日期：</label>
            <input type="date" id="temp-start-date" value="2026-07-01">
            <label>預計退房日期：</label>
            <input type="date" id="temp-end-date" value="2026-07-02">
            <label>住宿申請原因：</label>
            <select id="temp-reason-select" onchange="toggleTempReasonOther()">
                <option value="因活動需求，員工申請入住">因活動需求，員工申請入住</option>
                <option value="合作廠商入住">合作廠商入住</option>
                <option value="團客司領房">團客司領房</option>
                <option value="其他">其他 (請於下方填寫原因)</option>
            </select>
            <div id="temp-reason-other-box" style="display:none;">
                <input type="text" id="temp-reason-other-text" placeholder="請輸入自訂原因">
            </div>
            <button onclick="submitTempStay()" style="width:100%; margin-top:10px; background-color: #2196F3;">送出臨時入住</button>
        </div>
    </div>

    <div id="special-request-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('special-request-modal')">×</span>
            <h2>✨ 房客狀態特殊需求申請</h2>
            <label>選擇已入房間：</label>
            <select id="sr-room"></select>
            <label>變更特殊需求：</label>
            <select id="sr-type" onchange="toggleSpecialRequestFields()">
                <option value="NORMAL">還原常規住宿狀態</option>
                <option value="WAREHOUSE">申請轉為倉庫 (改按倉庫費計收)</option>
                <option value="SECURITY">申請轉為保全夜宿房 (免收管理費)</option>
                <option value="WARDEN">申請轉為舍監房 (免收管理費)</option>
                <option value="ROOMMATE">申請同住 (維持原費率，新增室友)</option>
                <option value="LEAVE_RETENTION">房間保留 (改倉庫計費，因留職停薪)</option>
            </select>
            <div id="sr-roommate-box" style="display:none;">
                <label>請輸入室友姓名：</label>
                <input type="text" id="sr-roommate-name" placeholder="請輸入室友大名">
            </div>
            <div id="sr-leave-box" style="display:none;">
                <label>請選擇留職停薪原因：</label>
                <select id="sr-leave-reason">
                    <option value="育嬰留停">育嬰留停</option>
                    <option value="因病留停">因病留停</option>
                </select>
                <label>留停開始日期：</label>
                <input type="date" id="sr-leave-start" value="2026-07-01" onchange="calculateRetentionFeePreview()">
                <label>留停預估結束日期：</label>
                <input type="date" id="sr-leave-end" value="2026-08-01">
                <div class="calc-preview" id="retention-calc-box">💡 請輸入正確的起迄日期試算。</div>
            </div>
            <button onclick="submitSpecialRequest()" style="width:100%; margin-top:15px; background-color: #7e57c2;">確認變更狀態</button>
        </div>
    </div>

    <div id="apply-leave-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-leave-modal')">×</span>
            <h2>申請退宿清除</h2>
            <label>選擇房間：</label>
            <select id="leave-room"></select>
            <label style="margin-top: 10px; display: block;">預定退宿日期：</label>
            <input type="date" id="leave-date" value="2026-06-30">
            <button onclick="submitApplyLeave()" style="width:100%; margin-top:10px;">送出退宿</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw95-wZ_jyk2dMG3zwPkBhVGHbYkLP0GSUM03eDctpQ955sI9u9OxKKMGuz53HUvsJxLQ/exec";
        const ELECTRICITY_RATE = 5; 
        const TODAY_STR = "2026-07-01"; 

        let rooms = {}; 
        let configParams = { mgmtFee: 1600, whFee: 500, suiteFee: 2400, historyLogs: [], deferredPayment: {}, lockedMonths: {} };
        let selectedReportMonth = "2026-06"; 
        let currentActiveView = "home"; 

        const DEFAULT_ROOMS_DATA = {
            "1-1": {name: "簡鴻存", isWarehouse: false, readings: [{date: "2026-05-04", value: 3732.2}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-2": {name: "簡鴻存", isWarehouse: true, readings: [{date: "2026-05-04", value: 1480}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-3": {name: "劉雨婷", isWarehouse: true, readings: [{date: "2026-05-04", value: 1886.3}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-4": {name: "李美娟", isWarehouse: false, readings: [{date: "2026-05-04", value: 2663.6}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-5": {name: "", isWarehouse: false, readings: [{date: "2026-05-04", value: 13.8}], leaveDate: ""},
            "1-6": {name: "楊曉嵐", isWarehouse: false, readings: [{date: "2026-05-04", value: 1308.4}], leaveDate: "", checkInDate: "2026-05-01"},
            "1-7": {name: "蘇建政", isWarehouse: false, readings: [{date: "2026-05-04", value: 1955.6}], leaveDate: "", checkInDate: "2026-05-01", isSecurityOnly: true},
            "2-1": {name: "", isWarehouse: false, readings: [{date: "2026-05-04", value: 1065.5}], leaveDate: ""},
            "2-2": {name: "宿舍備品室", isWarehouse: false, readings: [{date: "2026-05-04", value: 385.2}], leaveDate: "", isSpecialLock: true},
            "2-6": {name: "蔡玉萍", isWarehouse: false, readings: [{date: "2026-05-04", value: 2665}], leaveDate: "", checkInDate: "2026-05-01"},
            "3-1": {name: "", isWarehouse: true, readings: [{date: "2026-05-04", value: 530.2}], leaveDate: "2026-06-30", checkInDate: "2026-05-01", lastArchivedName: "劉雨婷", lastArchivedIsWarehouse: true},
            "3-7": {name: "楊曉嵐", isWarehouse: false, readings: [{date: "2026-05-04", value: 997.4}], leaveDate: "", checkInDate: "2026-05-01"},
            "4-1": {name: "", isWarehouse: false, readings: [{date: "2026-05-04", value: 0}], leaveDate: "", isDriverOnly: true},
            "4-2": {name: "", isWarehouse: false, readings: [{date: "2026-05-04", value: 0}], leaveDate: "", isDriverOnly: true},
            "4-3": {name: "王岑瑄", isWarehouse: false, readings: [{date: "2026-05-31", value: 3308.6}], leaveDate: "", checkInDate: "2026-05-31"},
            "4-4": {name: "王岑瑄", isWarehouse: true, readings: [{date: "2026-05-31", value: 903.1}], leaveDate: "", checkInDate: "2026-05-31"},
            "4-5": {name: "李泓楷", isWarehouse: false, readings: [{date: "2026-05-04", value: 1177.1}], leaveDate: "", checkInDate: "2026-05-01"},
            "5-1": {name: "謝俊逸", isWarehouse: false, readings: [{date: "2026-05-04", value: 4043.4}], leaveDate: "", checkInDate: "2026-05-01"}
        };

        const ALL_FLOORS = {
            '第一排': ['1-1','1-2','1-3','1-4','1-5','1-6','1-7'],
            '第二排': ['2-1','2-2','2-3','2-4','2-5','2-6','2-7'],
            '第三排': ['3-1','3-2','3-3','3-4','3-5','3-6','3-7'],
            '第四排': ['4-1','4-2','4-3','4-4','4-5','4-6','4-7'],
            '第五排': ['5-1'],
            '公共區域': ['公共區域A', '公共區域B']
        };

        // ====================================================================
        // v38 核心模組：歷史履歷演算法 (stayHistory) 核心實作
        // ====================================================================

        /**
         * 輔助函式：判斷日期是否落在指定月份
         */
        function isDateInMonth(dateStr, monthStr) {
            if (!dateStr) return false;
            return dateStr.startsWith(monthStr);
        }

        /**
         * 歸檔特定房間現有房客至 stayHistory
         */
        function archiveRoomStay(roomId, optionalLeaveDate = null) {
            const room = rooms[roomId];
            if (!room || !room.name) return false;
            
            if (!room.stayHistory) room.stayHistory = [];
            
            const finalLeaveDate = optionalLeaveDate || room.leaveDate || TODAY_STR;
            
            const historyEntry = {
                name: room.name,
                isWarehouse: !!room.isWarehouse,
                isWarden: !!room.isWarden,
                isSecurityOnly: !!room.isSecurityOnly,
                isLeaveRetention: !!room.isLeaveRetention,
                leaveRetentionReason: room.leaveRetentionReason || "",
                hasRoommate: !!room.hasRoommate,
                roommateName: room.roommateName || "",
                checkInDate: room.checkInDate || "",
                leaveDate: finalLeaveDate
            };
            
            room.stayHistory.push(historyEntry);
            return true;
        }

        /**
         * 依月份至 stayHistory 優先查找退宿歷史履歷
         */
        function findHistoryLeaveInMonth(roomId, monthStr) {
            const room = rooms[roomId];
            if (!room || !room.stayHistory || room.stayHistory.length === 0) return null;
            
            // 優先找出：退宿日期（leaveDate）落在該計費月份的紀錄
            return room.stayHistory.find(h => isDateInMonth(h.leaveDate, monthStr)) || null;
        }

        /**
         * 舊資料自動相容與修復遷移機制 (防重複)
         */
        function migrateLegacyArchiveIfNeeded() {
            let migratedCount = 0;
            Object.keys(rooms).forEach(roomId => {
                const room = rooms[roomId];
                if (!room) return;
                if (!room.stayHistory) room.stayHistory = [];
                
                // 若發現舊架構留有退宿痕跡且尚未同步至陣列中，自動幫行政人員補齊履歷
                if (!room.name && room.leaveDate && room.lastArchivedName) {
                    const alreadyMigrated = room.stayHistory.some(h => 
                        h.name === room.lastArchivedName && h.leaveDate === room.leaveDate
                    );
                    
                    if (!alreadyMigrated) {
                        room.stayHistory.push({
                            name: room.lastArchivedName,
                            isWarehouse: room.lastArchivedIsWarehouse !== undefined ? !!room.lastArchivedIsWarehouse : !!room.isWarehouse,
                            isWarden: !!room.isWarden,
                            isSecurityOnly: !!room.isSecurityOnly,
                            isLeaveRetention: !!room.isLeaveRetention,
                            leaveRetentionReason: room.leaveRetentionReason || "",
                            hasRoommate: !!room.hasRoommate,
                            roommateName: room.roommateName || "",
                            checkInDate: room.checkInDate || "2026-05-01",
                            leaveDate: room.leaveDate
                        });
                        migratedCount++;
                    }
                }
            });
            if (migratedCount > 0) {
                console.log(`[歷史遷移] v38 已自動將 ${migratedCount} 筆舊式退宿封存資料轉換至 stayHistory 軌跡陣列中。`);
            }
        }

        // ====================================================================
        // 行政異動與計費業務邏輯整合
        // ====================================================================

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        function showLoading(status) {
            document.getElementById('loading-overlay').style.display = status ? 'block' : 'none';
        }

        function isCurrentMonthLocked() {
            if(!configParams || !configParams.lockedMonths) return false;
            return configParams.lockedMonths[selectedReportMonth] === true;
        }

        /**
         * 到期自動判定：系統時間重置、到期日呼叫 archiveRoomStay() 完整歸檔
         */
        async function checkAndProcessDateStatus() {
            let needsSave = false;
            Object.keys(rooms).forEach(roomId => {
                const room = rooms[roomId];
                if (room.tempList && room.tempList.length > 0) {
                    const origLen = room.tempList.length;
                    room.tempList = room.tempList.filter(t => !t.endDate || t.endDate > TODAY_STR);
                    if (room.tempList.length !== origLen) needsSave = true;
                    if (room.tempList.length === 0) {
                        delete room.tempList;
                        if(room.isTemp) {
                            room.name = ''; room.isTemp = false; room.tempInfo = null; room.checkInDate = ''; room.leaveDate = '';
                            needsSave = true;
                        }
                    } else {
                        syncActiveTempRecord(roomId);
                    }
                } 
                
                if (room.leaveDate && room.leaveDate <= TODAY_STR && !room.isTemp) {
                    if (room.name) {
                        // 執行 v38 歷史履歷陣列歸檔
                        archiveRoomStay(roomId, room.leaveDate);
                        
                        room.lastArchivedName = room.name; 
                        room.lastArchivedIsWarehouse = room.isWarehouse;
                        room.name = ''; 
                        needsSave = true;
                    }
                }
                if (room.isBookingFuture && room.checkInDate && room.checkInDate <= TODAY_STR) {
                    room.isBookingFuture = false;
                    needsSave = true;
                }
            });
            if (needsSave) {
                await saveToCloud();
            }
        }

        function syncActiveTempRecord(roomId) {
            const room = rooms[roomId];
            if(!room || !room.tempList || room.tempList.length === 0) return;
            let activeTemp = room.tempList[room.tempList.length - 1]; 
            room.name = activeTemp.name;
            room.isTemp = true;
            room.checkInDate = activeTemp.startDate;
            room.leaveDate = activeTemp.endDate;
            room.tempInfo = activeTemp;
        }

        async function loadCloudData() {
            showLoading(true);
            try {
                const response = await fetch(`${GAS_URL}?_=${new Date().getTime()}`);
                const cloudRooms = await response.json();
                
                if (cloudRooms && cloudRooms.SYSTEM_ROOMS_DATA) {
                    rooms = cloudRooms.SYSTEM_ROOMS_DATA;
                    if(cloudRooms.SYSTEM_CONFIG) { configParams = cloudRooms.SYSTEM_CONFIG; }
                } else if (cloudRooms && Object.keys(cloudRooms).length > 2) {
                    rooms = cloudRooms;
                } else {
                    rooms = JSON.parse(JSON.stringify(DEFAULT_ROOMS_DATA));
                    initMissingRooms();
                    await saveToCloud();
                }
            } catch (error) {
                console.error("Cloud data loading issue:", error);
                rooms = JSON.parse(JSON.stringify(DEFAULT_ROOMS_DATA));
            } declareDataFields();
        }

        async function declareDataFields() {
            if(!configParams) configParams = {};
            if(!configParams.historyLogs) configParams.historyLogs = [];
            if(!configParams.deferredPayment) configParams.deferredPayment = {};
            if(!configParams.lockedMonths) configParams.lockedMonths = {};
            if(!configParams.mgmtFee) configParams.mgmtFee = 1600;
            if(!configParams.whFee) configParams.whFee = 500;
            if(!configParams.suiteFee) configParams.suiteFee = 2400;

            document.getElementById('cfg-mgmt-fee').value = configParams.mgmtFee;
            document.getElementById('cfg-wh-fee').value = configParams.whFee;
            document.getElementById('cfg-suite-fee').value = configParams.suiteFee;

            initMissingRooms();
            migrateLegacyArchiveIfNeeded(); // 開機自動安全校驗並遷移
            await checkAndProcessDateStatus(); 
            renderRoomList();
            renderRateHistory();
            
            if(currentActiveView === "home") showDefaultHome();
            else if(currentActiveView === "temp_list") showTempStayList();
            else switchRoom(currentActiveView);
            
            showLoading(false);
        }

        async function saveToCloud() {
            showLoading(true);
            const packageData = { SYSTEM_ROOMS_DATA: rooms, SYSTEM_CONFIG: configParams };
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(packageData)
                });
            } catch (error) { console.log("Cloud status updated"); }
            finally {
                renderRoomList();
                renderRateHistory();
                if(currentActiveView === "home") showDefaultHome();
                else if(currentActiveView === "temp_list") showTempStayList();
                else switchRoom(currentActiveView);
                showLoading(false);
            }
        }

        function saveConfigParams() {
            if(isCurrentMonthLocked()) { alert("⚠️ 當前選取的月份財務已結案鎖定，無法變更參數費率！"); return; }
            configParams.mgmtFee = parseFloat(document.getElementById('cfg-mgmt-fee').value) || 0;
            configParams.whFee = parseFloat(document.getElementById('cfg-wh-fee').value) || 0;
            configParams.suiteFee = parseFloat(document.getElementById('cfg-suite-fee').value) || 0;
            const effDate = document.getElementById('cfg-effective-date').value;

            const logStr = `${effDate} 起: 一般 ${configParams.mgmtFee} | 倉庫 ${configParams.whFee} | 套房 ${configParams.suiteFee}`;
            configParams.historyLogs.unshift(logStr);

            alert(`✅ 費率參數更新成功！`);
            saveToCloud();
        }

        function renderRateHistory() {
            const logBox = document.getElementById('rate-history-log');
            if(!logBox) return;
            if(!configParams.historyLogs || configParams.historyLogs.length === 0) {
                logBox.innerHTML = "暫無歷史變更紀錄";
                return;
            }
            logBox.innerHTML = configParams.historyLogs.map(log => `• ${log}`).join('<br>');
        }

        function initMissingRooms() {
            Object.values(ALL_FLOORS).forEach(roomList => {
                roomList.forEach(roomId => {
                    if (!rooms[roomId]) {
                        rooms[roomId] = { name: "", isWarehouse: false, readings: [], leaveDate: "", checkInDate: "", stayHistory: [] };
                    }
                    if (!rooms[roomId].stayHistory) rooms[roomId].stayHistory = [];
                    if(roomId === "2-2") rooms[roomId].isSpecialLock = true;
                    if(roomId === "4-1" || roomId === "4-2") rooms[roomId].isDriverOnly = true;
                });

         * 側邊欄渲染：優先從 stayHistory 找回退宿房客大名與狀態標籤

            Object.keys(ALL_FLOORS).forEach(floorName => {
                const floorDiv = document.createElement('div');

                const floorContent = document.createElement('div');
                floorContent.className = 'floor-content';
                floorContent.style.display = 'block';
                
                ALL_FLOORS[floorName].forEach(roomId => {
                    const room = rooms[roomId];
                    const item = document.createElement('div');
                    
                    let displayName = roomId; let tags = ''; let isEmpty = false;

                    // 1. 優先使用 v38 歷史履歷陣列查找
                    const historyLeave = findHistoryLeaveInMonth(roomId, selectedReportMonth);

                    if (roomId.includes("公共區域")) {
                        displayName = roomId;
                    } else if (room.isSpecialLock) {
                        displayName = `${roomId} 備品室`;
                        tags += '<span class="tag tag-special">管制</span>';
                    } else if (room.isTemp && room.tempInfo) {
                        displayName = `${roomId} ${room.name || room.tempInfo.name || ''}`;
                    } else if (room.name) {
                        let nameStr = room.name;
                        if(room.hasRoommate && room.roommateName) nameStr += ` + ${room.roommateName}`;
                        displayName = `${roomId} ${nameStr}`;
                        if(room.isBookingFuture) displayName = `${roomId}`;
                    } else if (historyLeave) {

                        let nameStr = room.lastArchivedName || DEFAULT_ROOMS_DATA[roomId]?.lastArchivedName || "已退客房";

                        isEmpty = true;
                    }
                    
                    item.className = `room-item ${roomId === currentActiveView ? 'active' : ''} ${isEmpty ? 'empty-room' : ''}`;
                    if (room.isDriverOnly && !room.name) tags += '<span class="tag tag-special" style="background:#5c6bc0;">司領房</span>';
                    
                    if (!roomId.includes("公共區域")) {
                        if (room.name && room.isBookingFuture) {
                            tags += `<span class="tag tag-booking">📅 預約(${room.name})</span>`;
                        } else if (room.name || historyLeave || (room.leaveDate && isDateInMonth(room.leaveDate, selectedReportMonth))) {
                            
                            // 判斷要採用的屬性資料來源
                            const targetAuth = historyLeave || room; 
                            
                            if (targetAuth.isWarden) { tags += '<span class="tag tag-warden">舍監</span>'; }
                            if (targetAuth.isLeaveRetention) { tags += `<span class="tag tag-leave-status">⏳ 留停房</span>`; }
                            if (targetAuth.isSecurityOnly) { tags += '<span class="tag tag-special" style="background:#4caf50;">保全</span>'; }
                            if (targetAuth.isWarehouse && !targetAuth.isLeaveRetention) { tags += '<span class="tag tag-warehouse">倉庫</span>'; }
                            if (targetAuth.hasRoommate) { tags += '<span class="tag tag-special" style="background:#00bcd4;">雙人同住</span>'; }
                            
                            if (room.isTemp) { 
                                let dateLabel = "";
                                if(room.tempInfo && room.tempInfo.startDate) {
                                    const dParts = room.tempInfo.startDate.split('-');
                                    if(dParts.length === 3) { dateLabel = `${parseInt(dParts[1])}/${parseInt(dParts[2])} `; }
                                }
                                tags += `<span class="tag tag-temp">${dateLabel}臨時</span>`; 
                            }
                            
                            if (historyLeave) {
                                tags += `<span class="tag tag-leave">${monthStrFilter(historyLeave.leaveDate)}已退</span>`;
                            } else if (room.leaveDate) { 
                                tags += `<span class="tag tag-leave">${monthStrFilter(room.leaveDate)}已退</span>`; 
                            }
                        }
                    }
                    
                    item.innerHTML = `${displayName}${tags}`;
                    item.onclick = () => {
                        switchRoom(roomId);
                        if(window.innerWidth <= 768) toggleMenu();
                    };
                    floorContent.appendChild(item);
                });
                floorDiv.appendChild(floorContent);
                list.appendChild(floorDiv);
            });
        }

            if(!dateStr) return "";

            return p.length >= 2 ? `${parseInt(p[1])}月` : "";

        /**
         * v38 計費模組：優先追溯 stayHistory 履歷陣列，徹底消除覆蓋失蹤 Bug
         */
        function calculateRoomBill(roomId, monthStr) {
            const room = rooms[roomId];
            let res = { nameDisplay: "空房", prev: "—", curr: "—", degree: 0, elecFee: 0, mgmtFee: 0, total: 0, note: "", isTenantCharge: false };
            
            if(!room) return res;

            let isPublic = roomId.includes("公共");
            
            // A. 優先進行 v38 歷史履歷比對
            let historyLeave = findHistoryLeaveInMonth(roomId, monthStr);
            let isLeavedInThisMonth = !!historyLeave || (room.leaveDate && isDateInMonth(room.leaveDate, monthStr));
            
            let activeName = "";
            let isWh = room.isWarehouse;
            let targetAuth = room;

            // ---- 🔀 重新梳理身分判定權限，絕對互斥，避免洗掉 ----
            if (isPublic) {
                res.nameDisplay = "公共分攤區域";
                res.isTenantCharge = false; 
            } else if (isLeavedInThisMonth) {
                // 【情境 1：當月退宿】最高優先權
                if (historyLeave) {
                    activeName = historyLeave.name;
                    if (historyLeave.hasRoommate && historyLeave.roommateName) activeName += ` + ${historyLeave.roommateName}`;
                    isWh = historyLeave.isWarehouse;
                    targetAuth = historyLeave;
                } else {
                    activeName = room.lastArchivedName || DEFAULT_ROOMS_DATA[roomId]?.lastArchivedName || room.name || "已退宿房客";
                    isWh = (room.lastArchivedIsWarehouse !== undefined) ? room.lastArchivedIsWarehouse : room.isWarehouse;
                }
                res.note += `[${monthStrFilter(historyLeave ? historyLeave.leaveDate : room.leaveDate)}退宿清算] `;
                res.isTenantCharge = true; 
            } else if (room.isTemp) {
                // 【情境 2：臨時房客】次要優先權
                let hasTempInThisMonth = false;
                if(room.tempList && room.tempList.length > 0) {
                    hasTempInThisMonth = room.tempList.some(t => t.startDate && isDateInMonth(t.startDate, monthStr));
                }
                if(hasTempInThisMonth) {
                    activeName = room.name;
                    isWh = false;
                    res.isTenantCharge = true;
                } else {
                    activeName = "";
                    res.isTenantCharge = false;
                }
            } else if (room.name) {
                // 【情境 3：常規長期房客】
                if (room.checkInDate && room.checkInDate > `${monthStr}-31`) {
                    activeName = ""; // 未來預約，當月不計費
                    res.isTenantCharge = false;
                } else {
                    activeName = room.name;
                    if(room.hasRoommate && room.roommateName) activeName += ` + ${room.roommateName}`;
                    res.isTenantCharge = true; 
                }
            } else {
                // 【情境 4：真正空房】
                activeName = "";
                res.isTenantCharge = false;
            }

            // ---- ⚡ 電表抄表度數區間試算 ----
            if(room.readings && room.readings.length > 0) {
                let sorted = [...room.readings].sort((a, b) => new Date(a.date) - new Date(b.date));
                
                if (monthStr === "2026-06") {
                    let prevList = sorted.filter(r => new Date(r.date) < new Date("2026-06-01"));
                    if(prevList.length > 0) res.prev = prevList[prevList.length - 1].value;

                    let currList = sorted.filter(r => new Date(r.date) >= new Date("2026-06-01") && new Date(r.date) <= new Date("2026-07-05T23:59:59"));
                    if(currList.length > 0) {
                        res.curr = currList[currList.length - 1].value;
                    } else if (isLeavedInThisMonth && sorted.length > 0) {
                        res.curr = sorted[sorted.length - 1].value; 
                    }
                } else if (monthStr === "2026-07") {
                    let prevList = sorted.filter(r => new Date(r.date) >= new Date("2026-06-01") && new Date(r.date) <= new Date("2026-07-05T23:59:59"));
                    if(prevList.length > 0) res.prev = prevList[prevList.length - 1].value;

                    let currList = sorted.filter(r => r.date.startsWith("2026-07") && new Date(r.date) > new Date("2026-07-05T23:59:59"));
                    if(currList.length > 0) res.curr = currList[currList.length - 1].value;
                } else {
                    let prevList = sorted.filter(r => new Date(r.date) < new Date(`${monthStr}-01`));
                    if(prevList.length > 0) res.prev = prevList[prevList.length - 1].value;

                    let currList = sorted.filter(r => r.date.startsWith(monthStr));
                    if(currList.length > 0) res.curr = currList[currList.length - 1].value;
                }

                if(res.prev !== "—" && res.curr !== "—") {
                    res.degree = Math.max(0, Math.round((res.curr - res.prev) * 10) / 10);
                    res.elecFee = Math.round(res.degree * ELECTRICITY_RATE);
                }
            }

            if(room.isSpecialLock) { 
                res.nameDisplay = room.name || "備品室"; 
                res.isTenantCharge = false;
                res.total = res.elecFee;
                return res; 
            }

            // ---- 💰 費用計算主體 ----
            if(activeName) {
                res.nameDisplay = activeName;
                res.mgmtFee = (roomId === "5-1") ? configParams.suiteFee : (isWh ? configParams.whFee : configParams.mgmtFee);
                
                if(targetAuth.isWarden || targetAuth.isSecurityOnly || room.isTemp) res.mgmtFee = 0;
                res.total = res.elecFee + res.mgmtFee;
            } else if (room.isDriverOnly) {
                res.nameDisplay = "司領房"; res.isTenantCharge = false; res.total = res.elecFee;
            } else if (isPublic) {
                res.total = res.elecFee;
            } else {
                res.total = res.elecFee;
                res.note += res.elecFee > 0 ? "[空房期間用電] " : "";
            }
            return res;
            }
        function switchRoom(roomId) {
            currentActiveView = roomId;
            renderRoomList();
            const displayArea = document.getElementById('main-display-area');
            if(!displayArea) return;

            const room = rooms[roomId];
            if(!room) { displayArea.innerHTML = "<h3>找不到此房間資訊</h3>"; return; }

            let isLocked = isCurrentMonthLocked();
            let disabledStr = isLocked ? "disabled" : "";

            if(room.readings) { room.readings.sort((a, b) => new Date(b.date) - new Date(a.date)); }
            let isPublicArea = roomId.includes("公共區域");

            let specialNoteText = "常規一般住宿";
            if(room.isSpecialLock) specialNoteText = "倉庫 / 備品管制室";
            else if(room.isDriverOnly) specialNoteText = "團客司領房 (不計常規月費)";
            else if(room.isWarden) specialNoteText = "舍監專用房 (管理費免收)";
            else if(room.isSecurityOnly) specialNoteText = "保全夜宿房 (管理費免收)";
            else if(room.isLeaveRetention) specialNoteText = `留職停薪保留房 (${room.leaveRetentionReason || '原因未註明'}，改倉庫費收費)`;
            else if(room.isWarehouse) specialNoteText = "倉庫用途 (改倉庫費收費)";

            let html = `
                <h2>🚪 房間詳情管理: ${roomId}</h2>
                <div id="meter-section">
                    <h3>⚡ 電表抄表紀錄 (最新日期在最上方)</h3>
                    <p>當前計費電價：<b>$${ELECTRICITY_RATE}</b> 元 / 度</p>
                    <div style="display:flex; gap:10px; margin-bottom:12px; max-width:400px;">
                        <input type="number" step="0.1" id="new-meter-value" placeholder="請輸入最新電表度數" ${disabledStr}>
                        <input type="date" id="new-meter-date" value="${TODAY_STR}" ${disabledStr}>
                        <button onclick="addMeterReading('${roomId}')" style="margin:0;" ${disabledStr}>儲存</button>
                    </div>
                    <div class="table-responsive">
                        <table style="min-width:400px;">
                            <tr style="background:#e6f0ea;"><th>抄表日期</th><th>電表止數</th><th>操作</th></tr>
                            ${renderReadingRows(roomId)}
                        </table>
                    </div>
                </div>
            `;

            if (!isPublicArea) {
                html += `
                    <div class="bill-summary-box" style="background:#f9f9f9; border-color:#ccc;">
                        <h3>📋 房間狀態與基本資料</h3>
                        <p><b>房客大名：</b> ${room.name || room.lastArchivedName || '暫無長期房客 (空房)'}</p>
                        ${room.hasRoommate ? `<p><b>同住室友：</b> ${room.roommateName || ''}</p>`:''}
                        <p><b>入住日期：</b> ${room.checkInDate || '—'}</p>
                        ${room.leaveDate ? `<p style="color:red;"><b>預定退宿日期：</b> ${room.leaveDate}</p>`:''}
                        <p style="color: #7e57c2; font-weight: bold;"><b>❗ 特殊需求註記：</b> <span style="background: #eee; padding: 3px 8px; border-radius: 4px;">${specialNoteText}</span></p>
                        ${renderMultiTempStayLogs(roomId)}
                        ${renderStayHistoryLogs(roomId)}
                    </div>
                `;
            } else {
                html += `
                    <div class="bill-summary-box" style="background:#f5f5f5; border-color:#bbb;">
                        💡 <b>提示：</b>本區域為公共分攤場域，系統會於總體財務清冊自動帶出電費，但不開放辦理入住。
                    </div>
                `;
            }
            displayArea.innerHTML = html;
        }

        function renderReadingRows(roomId) {
            const room = rooms[roomId];
            if(!room || !room.readings || room.readings.length === 0) return `<tr><td colspan="3">暫無抄表紀錄</td></tr>`;
            return room.readings.map((r, idx) => `
                <tr>
                    <td><b>${r.date}</b></td>
                    <td>${r.value}</td>
                    <td><button class="btn-danger" style="padding:4px 8px; font-size:12px;" onclick="deleteReading('${roomId}', ${idx})">刪除</button></td>
                </tr>
            `).join('');
        }

        function addMeterReading(roomId) {
            const valInput = document.getElementById('new-meter-value');
            const dateInput = document.getElementById('new-meter-date');
            if(!valInput || !valInput.value) return;

            if(!rooms[roomId].readings) rooms[roomId].readings = [];
            rooms[roomId].readings.push({ date: dateInput.value, value: parseFloat(valInput.value) });
            rooms[roomId].readings.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            alert(`✅ 電表紀錄已儲存！`);
            saveToCloud();
        }

        function deleteReading(roomId, idx) {
            if(confirm("確定要刪除這筆抄表紀錄嗎？")) {
                rooms[roomId].readings.splice(idx, 1);
                saveToCloud();
            }
        }

        function renderMultiTempStayLogs(roomId) {
            const room = rooms[roomId];
            if(!room || !room.tempList || room.tempList.length === 0) return "";
            let html = `<h4>📋 本房臨時預約明細：</h4><ul>`;
            room.tempList.forEach((t, idx) => {
                html += `<li><b>${t.name}</b> (${t.count || 1}人) : ${t.startDate} ~ ${t.endDate} 
                <br><small style="color:#555;">原因：${t.reason} | 申請人：${t.applicant || '—'}</small>
                <button class="btn-danger" style="padding:2px 6px; font-size:11px; margin-left:10px;" onclick="deleteTempStayRecord('${roomId}', ${idx})">刪除預約</button></li>`;
            });
            html += `</ul>`;
            return html;
        }

        /**
         * 渲染詳細面板中，精準無誤的歷史履歷軌跡紀錄表面
         */
        function renderStayHistoryLogs(roomId) {
            const room = rooms[roomId];
            if(!room || !room.stayHistory || room.stayHistory.length === 0) return "";
            let html = `<h4 style="color:var(--main-green); margin-top:15px;">📜 歷史歸檔履歷清單 (Stay History)：</h4><ul style="font-size:13px; background:#fff; padding:10px 25px; border:1px solid #ddd; border-radius:6px;">`;
            room.stayHistory.forEach(h => {
                let tagStr = h.isWarehouse ? " [倉庫]" : " [常駐]";
                if(h.isWarden) tagStr = " [舍監房]";
                if(h.isSecurityOnly) tagStr = " [保全夜宿]";
                if(h.isLeaveRetention) tagStr = ` [留停保留:${h.leaveRetentionReason}]`;
                html += `<li style="margin-bottom:4px;">👤 <b>${h.name}</b>${h.hasRoommate?` (同住:${h.roommateName})`:''}${tagStr} | 居住區間：${h.checkInDate || '未註明'} ~ ${h.leaveDate}</li>`;
            });
            html += `</ul>`;
            return html;
        }

        function deleteTempStayRecord(roomId, idx) {
            if(confirm("確定要刪除此筆臨時入住預約嗎？")) {
                rooms[roomId].tempList.splice(idx, 1);
                if(rooms[roomId].tempList.length === 0) {
                    delete rooms[roomId].tempList;
                    rooms[roomId].name = "";
                    rooms[roomId].isTemp = false;
                } else {
                    syncActiveTempRecord(roomId);
                }
                saveToCloud();
            }
        }

        function openModal(id) { 
            document.getElementById(id).style.display = 'block'; 
            initModalRoomSelects();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function showApplyStayModal() { openModal('apply-stay-modal'); }
        function showTempStayModal() { openModal('temp-stay-modal'); }
        function showSpecialRequestModal() { openModal('special-request-modal'); }
        function showApplyLeaveModal() { openModal('apply-leave-modal'); }

        function initModalRoomSelects() {
            const selects = ['apply-room', 'temp-room', 'sr-room', 'leave-room'];
            let optionsHtml = '<option value="">--請選擇房間--</option>';
            
            Object.keys(ALL_FLOORS).forEach(floor => {
                ALL_FLOORS[floor].forEach(r => {
                    if(!r.includes("公共")) {
                        optionsHtml += `<option value="${r}">${r} (${rooms[r]?.name ? rooms[r].name : '空房'})</option>`;
                    }
                });
            });

            selects.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = optionsHtml;
            });
        }

        function toggleApplySpecialFields() {
            const type = document.getElementById('apply-special-type').value;
            document.getElementById('apply-roommate-box').style.display = type === 'ROOMMATE' ? 'block' : 'none';
        }

        function toggleTempReasonOther() {
            const val = document.getElementById('temp-reason-select').value;
            document.getElementById('temp-reason-other-box').style.display = val === '其他' ? 'block' : 'none';
        }

        function syncTempName() {
            if(document.getElementById('temp-same-person').checked) {
                document.getElementById('temp-name').value = document.getElementById('temp-applicant').value;
            }
        }

        function toggleSpecialRequestFields() {
            const type = document.getElementById('sr-type').value;
            document.getElementById('sr-roommate-box').style.display = type === 'ROOMMATE' ? 'block' : 'none';
            document.getElementById('sr-leave-box').style.display = type === 'LEAVE_RETENTION' ? 'block' : 'none';
            calculateRetentionFeePreview();
        }

        function calculateRetentionFeePreview() {
            const start = document.getElementById('sr-leave-start').value;
            const end = document.getElementById('sr-leave-end').value;
            const box = document.getElementById('retention-calc-box');
            if(!start || !end || end < start) {
                box.innerHTML = "💡 請輸入正確的起迄日期試算。";
                return;
            }
            let days = Math.round((new Date(end) - new Date(start)) / (1000*60*60*24));
            let estFee = Math.ceil((days / 30) * configParams.whFee);
            box.innerHTML = `📊 留停天數試算：<b>${days}</b> 天，預計預收留停保留費：<b>$${estFee}</b> 元。`;
        }

        /**
         * 新人入住申請：寫入前自動將未歸檔的舊人強制封存入陣列，並深度清洗身分特徵
         */
        function submitApplyStay() {
            const roomId = document.getElementById('apply-room').value;
            const name = document.getElementById('apply-name').value;
            const startDate = document.getElementById('apply-start-date').value;
            const type = document.getElementById('apply-special-type').value;

            if(!roomId || !name) { alert("請填寫完整房間與姓名"); return; }

            const room = rooms[roomId];
            
            // 安全防護：若有舊人尚未被 checkOut 流程封存，執行強制截斷與封存
            if(room.name && room.name !== name) {
                archiveRoomStay(roomId, room.leaveDate || TODAY_STR);
            }

            // 完全覆蓋、重置基本核心欄位
            room.name = name;
            room.checkInDate = startDate;
            room.leaveDate = '';
            room.lastArchivedName = '';
            room.lastArchivedIsWarehouse = false;
            
            // 清理身分屬性特徵防止交叉污染
            room.isWarehouse = (type === 'WAREHOUSE');
            room.isWarden = (type === 'WARDEN');
            room.isSecurityOnly = (type === 'SECURITY');
            room.isLeaveRetention = false;
            room.leaveRetentionReason = '';
            room.hasRoommate = false;
            room.roommateName = '';
            
            if(type === 'ROOMMATE') {
                room.hasRoommate = true;
                room.roommateName = document.getElementById('apply-roommate-name').value;
            }
            if(startDate > TODAY_STR) room.isBookingFuture = true;

            alert(`✅ ${roomId} 長期入住申請成功，舊有殘留狀態已安全重置歸檔！`);
            closeModal('apply-stay-modal');
            saveToCloud();
        }

        function submitTempStay() {
            const roomId = document.getElementById('temp-room').value;
            const applicant = document.getElementById('temp-applicant').value;
            const name = document.getElementById('temp-name').value;
            const count = parseInt(document.getElementById('temp-count').value) || 1;
            const startDate = document.getElementById('temp-start-date').value;
            const endDate = document.getElementById('temp-end-date').value;
            
            let reason = document.getElementById('temp-reason-select').value;
            if(reason === '其他') reason = document.getElementById('temp-reason-other-text').value;

            if(!roomId || !name || !startDate || !endDate) { alert("請填寫臨時入住必要資訊"); return; }
            if(!rooms[roomId].tempList) rooms[roomId].tempList = [];
            
            rooms[roomId].tempList.push({ name, applicant, count, startDate, endDate, reason });
            syncActiveTempRecord(roomId);

            alert(`✅ ${roomId} 臨時入住預約成功！`);
            closeModal('temp-stay-modal');
            saveToCloud();
        }

        function showTempStayList() {
            currentActiveView = "temp_list";
            renderRoomList();
            const displayArea = document.getElementById('main-display-area');
            if(!displayArea) return;

            let html = `<h2>📋 全廠全月份臨時入住預約清單總覽</h2>
                        <div class="table-responsive"><table>
                        <thead>
                            <tr style="background:#01579b; color:white;">
                                <th>房號</th><th>住宿大名</th><th>人數</th><th>入住區間</th><th>申請原因</th><th>申請人</th>
                            </tr>
                        </thead>
                        <tbody>`;
            let count = 0;
            Object.keys(rooms).forEach(roomId => {
                const room = rooms[roomId];
                if(room.tempList && room.tempList.length > 0) {
                    room.tempList.forEach(t => {
                        count++;
                        html += `<tr>
                            <td><b>${roomId}</b></td>
                            <td>${t.name}</td>
                            <td>${t.count}</td>
                            <td>${t.startDate} ~ ${t.endDate}</td>
                            <td>${t.reason}</td>
                            <td>${t.applicant || '—'}</td>
                        </tr>`;
                    });
                }
            });
            if(count === 0) html += `<tr><td colspan="6">目前全系統暫無任何臨時預約記錄</td></tr>`;
            html += `</tbody></table></div>`;
            displayArea.innerHTML = html;
        }

        function submitSpecialRequest() {
            const roomId = document.getElementById('sr-room').value;
            const type = document.getElementById('sr-type').value;
            if(!roomId) return;

            const room = rooms[roomId];
            room.isWarehouse = (type === 'WAREHOUSE');
            room.isSecurityOnly = (type === 'SECURITY');
            room.isWarden = (type === 'WARDEN');
            
            if(type === 'ROOMMATE') {
                room.hasRoommate = true;
                room.roommateName = document.getElementById('sr-roommate-name').value;
            } else { room.hasRoommate = false; }

            if(type === 'LEAVE_RETENTION') {
                room.isLeaveRetention = true; room.isWarehouse = true;
                room.leaveRetentionReason = document.getElementById('sr-leave-reason').value;
                room.leaveDate = document.getElementById('sr-leave-end').value;
            } else { room.isLeaveRetention = false; }

            alert(`✅ 房間 ${roomId} 特殊狀態已成功更新！`);
            closeModal('special-request-modal');
            saveToCloud();
        }

        function submitApplyLeave() {
            const roomId = document.getElementById('leave-room').value;
            const lDate = document.getElementById('leave-date').value;
            if(!roomId) return;

            rooms[roomId].leaveDate = lDate;
            alert(`✅ 房間 ${roomId} 已設定預定退宿清除日為 ${lDate}`);
            closeModal('apply-leave-modal');
            saveToCloud();
        }

        function exportTableToExcel(tableId) {
            const table = document.getElementById(tableId);
            if (!table) return;
            
            let html = table.outerHTML;
            let excelFile = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:x='urn:schemas-microsoft-com:office:excel' xmlns='http://www.w3.org/TR/REC-html40'>";
            excelFile += "<head><meta charset='utf-8'></head><body>";
            excelFile += html;
            excelFile += "</body></html>";

            const blob = new Blob([excelFile], { type: "application/vnd.ms-excel;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `宿舍財務清冊_${selectedReportMonth}.xls`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function exportData() {
            const packageData = { SYSTEM_ROOMS_DATA: rooms, SYSTEM_CONFIG: configParams };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(packageData));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `dorm_backup_${TODAY_STR}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
        
        function triggerImport() { document.getElementById('import-file').click(); }
        
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.SYSTEM_ROOMS_DATA) {
                        rooms = imported.SYSTEM_ROOMS_DATA;
                        if(imported.SYSTEM_CONFIG) configParams = imported.SYSTEM_CONFIG;
                        alert("✅ 系統備份還原成功！正在上傳同步...");
                        await saveToCloud();
                    } else { alert("❌ 格式不符"); }
                } catch(err) { alert("❌ 解析失敗"); }
            };
            reader.readAsText(file);
        }

        window.onload = function() {
            loadCloudData();
        };
    </script>
</body>
</html>
