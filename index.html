<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍管理系統 (雲端同步版)</title>
    <style>
        :root { --main-green: #0f4c2a; --accent-green: #1e7a45; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e0f0e4; margin: 0; padding: 0; color: #0f2a1f; }
        
        nav { background: linear-gradient(135deg, var(--main-green), var(--accent-green)); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 101; }
        nav h1 { margin: 0; font-size: 20px; }
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 10px; margin: 0; }

        .container { max-width: 1200px; margin: 0 auto; background: white; min-height: 100vh; display: flex; position: relative; }
        
        .sidebar { width: 320px; background: #e6f0ea; padding: 15px; border-right: 1px solid #b0d4b8; box-sizing: border-box; transition: transform 0.3s ease; z-index: 100; }
        .content { flex: 1; padding: 20px; min-width: 300px; position: relative; box-sizing: border-box; }
        
        .floor-header { padding: 12px 15px; background: var(--main-green); color: white; font-weight: bold; margin: 8px 0 4px; border-radius: 8px; cursor: pointer; }
        .floor-content { display: block; }
        .room-item { padding: 12px 15px; margin: 4px 0; background: white; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; font-size: 15px; }
        .room-item:hover, .room-item.active { background: #b0d4b8; }
        .warehouse-tag { background: #ff9800; color: white; font-size: 12px; padding: 2px 8px; border-radius: 12px; margin-left: 8px; display: inline-block; }
        
        button { padding: 12px 16px; border: none; border-radius: 6px; background: var(--accent-green); color: white; cursor: pointer; margin: 5px 2px; font-size: 15px; }
        button:hover { background: #0f4c2a; }
        .btn-danger { background-color: #d9534f; }
        .btn-danger:hover { background-color: #c9302c; }
        .sidebar button { width: 100%; margin: 5px 0; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1002; }
        .modal-content { background: white; margin: 15% auto; padding: 25px; width: 85%; max-width: 450px; border-radius: 12px; position: relative; box-sizing: border-box; }
        .close { position: absolute; top: 10px; right: 20px; font-size: 32px; cursor: pointer; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin: 8px 0; box-sizing: border-box; font-size: 15px; width: 100%; }
        
        #meter-section { background: #f4fdf7; padding: 15px; border-radius: 8px; border: 1px solid #b0d4b8; margin-bottom: 20px; }
        #loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 99; text-align: center; padding-top: 100px; font-size: 18px; font-weight: bold; color: var(--main-green); }
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 500px; }
        th, td { padding: 10px 6px; font-size: 14px; border: 1px solid #ddd; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; top: 58px; left: 0; height: calc(100vh - 58px); transform: translateX(-100%); overflow-y: auto; box-shadow: 4px 0 10px rgba(0,0,0,0.1); background: #f4fbf7; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .content { padding: 15px; width: 100%; }
            #meter-section button { width: 46%; padding: 12px 5px; font-size: 14px; display: inline-block; }
        }
    </style>
</head>
<body>

    <nav>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h1>宿舍管理系統 (v17 實質同步版)</h1>
        <button onclick="loadCloudData()" style="padding: 6px 12px; font-size: 13px; background: #2196F3; margin:0;">🔄 重整刷新</button>
    </nav>

    <div class="container">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>

        <div class="sidebar" id="sidebar">
            <h3>宿舍管理</h3>
            <button onclick="showApplyStayModal()">申請入住</button>
            <button onclick="showApplyLeaveModal()">申請退宿</button>
            <hr>
            
            <h3>房間列表</h3>
            <div id="room-list"></div>
            <hr>
            
            <button onclick="exportData()" style="background-color: #666;">📤 匯出備份</button>
            <button onclick="triggerImport()" style="background-color: #666;">📥 匯入備份</button>
            <input type="file" id="import-file" style="display:none" onchange="importData(this)">
        </div>

        <div class="content">
            <div id="loading-overlay">⏳ 雲端資料同步中...</div>

            <div id="current-room-info">
                <h2>請選擇房間</h2>
            </div>
            
            <div id="meter-section">
                <h3>電表抄表</h3>
                <div style="margin-bottom: 10px;">
                    <label>抄表日期：<input type="date" id="meter-date" value="2026-06-27" style="width: auto;"></label>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>當期度數：<input type="number" id="meter-reading" placeholder="請輸入電表度數" step="0.1" style="width: auto;"></label>
                </div>
                <button onclick="takePhoto()">📱 直接拍照</button>
                <button onclick="performOCR()">🤖 OCR 辨識</button>
                <button onclick="saveMeterReading()" style="background-color: #2196F3; width: 95%;">儲存抄表</button>
            </div>
            
            <h3>歷史抄表紀錄</h3>
            <div class="table-responsive">
                <table id="history-table">
                    <thead>
                        <tr style="background-color: #e6f0ea;">
                            <th>日期</th>
                            <th>當期度數</th>
                            <th>用電量 (度)</th>
                            <th>當期電費</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="apply-stay-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-stay-modal')">×</span>
            <h2>申請入住</h2>
            <label>選擇房間：</label>
            <select id="apply-room"></select>
            <input type="text" id="apply-name" placeholder="入住姓名">
            <label style="display:block; margin: 10px 0;"><input type="checkbox" id="apply-warehouse"> 申請作為倉庫</label>
            <button onclick="submitApplyStay()" style="width:100%; margin-top:10px;">送出申請</button>
        </div>
    </div>

    <div id="apply-leave-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('apply-leave-modal')">×</span>
            <h2>申請退宿</h2>
            <label>選擇房間：</label>
            <select id="leave-room"></select>
            <input type="date" id="leave-date">
            <button onclick="submitApplyLeave()" style="width:100%; margin-top:10px;">送出退宿</button>
        </div>
    </div>

    <script>
        // ⚠️ 請務必把下方網址換成您在第一步重新部署 GAS 後拿到最新網址 ⚠️
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw95-wZ_jyk2dMG3zwPkBhVGHbYkLP0GSUM03eDctpQ955sI9u9OxKKMGuz53HUvsJxLQ/exec";
        const ELECTRICITY_RATE = 5; 

        let rooms = {}; 

        const DEFAULT_ROOMS_DATA = {
            "1-1": {name: "簡鴻存", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 3732.2}]},
            "1-2": {name: "簡鴻存", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 1480}]},
            "1-3": {name: "劉雨婷", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 1886.3}]},
            "1-4": {name: "李美娟", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2663.6}]},
            "1-5": {name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 13.8}]},
            "1-6": {name: "楊曉嵐", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1308.4}]},
            "1-7": {name: "蘇建政", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1955.6}]},
            "2-1": {name: "", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1065.5}]},
            "2-2": {name: "宿舍備品室", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 385.2}]},
            "2-6": {name: "蔡玉萍", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 2665}]},
            "3-1": {name: "劉雨婷", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-04", value: 530.2}]},
            "3-7": {name: "楊曉嵐", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 997.4}]},
            "4-3": {name: "王岑瑄", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-31", value: 3308.6}]},
            "4-4": {name: "王岑瑄", isWarehouse: true, managementFee: 500, readings: [{date: "2026-05-31", value: 903.1}]},
            "4-5": {name: "李泓楷", isWarehouse: false, managementFee: 1600, readings: [{date: "2026-05-04", value: 1177.1}]},
            "5-1": {name: "謝俊逸", isWarehouse: false, managementFee: 2400, readings: [{date: "2026-05-04", value: 4043.4}]}
        };

        const ALL_FLOORS = {
            '第一排': ['1-1','1-2','1-3','1-4','1-5','1-6','1-7'],
            '第二排': ['2-1','2-2','2-3','2-4','2-5','2-6','2-7'],
            '第三排': ['3-1','3-2','3-3','3-4','3-5','3-6','3-7'],
            '第四排': ['4-1','4-2','4-3','4-4','4-5','4-6','4-7'],
            '第五排': ['5-1'],
            '公共區域': ['公共區域A', '公共區域B']
        };

        let currentRoom = "1-1";

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        function showLoading(status) {
            document.getElementById('loading-overlay').style.display = status ? 'block' : 'none';
        }

        async function loadCloudData() {
            showLoading(true);
            try {
                const antiCacheUrl = `${GAS_URL}?_=${new Date().getTime()}`;
                const response = await fetch(antiCacheUrl);
                const cloudRooms = await response.json();
                
                if (cloudRooms && Object.keys(cloudRooms).length > 2) {
                    rooms = cloudRooms;
                    console.log("成功同步雲端最新數據。");
                } else {
                    rooms = JSON.parse(JSON.stringify(DEFAULT_ROOMS_DATA));
                    initMissingRooms();
                    await saveToCloud();
                }
            } catch (error) {
                console.log("讀取異常，載入內建初始名單。");
                rooms = JSON.parse(JSON.stringify(DEFAULT_ROOMS_DATA));
            } finally {
                initMissingRooms();
                switchRoom(currentRoom);
                showLoading(false);
            }
        }

        // 優化傳輸：重新改回標準的 text/plain 跨域格式，確保能真正獲得 Google 寫入完成的狀態
        async function saveToCloud() {
            showLoading(true);
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(rooms)
                });
                const result = await response.json();
                if (result && result.status === "success") {
                    alert("✅ 雲端同步成功！資料已寫入 Google Sheet。");
                } else {
                    alert("⚠️ 雲端接收未明，建議檢查試算表 A1 欄位。");
                }
            } catch (error) {
                // 如果因為 CORS 阻擋導致抓不到 response 狀態，提供警告引導檢查
                alert("📢 同步指令已發出，請重新整理另一裝置確認。若依然失敗，請確認 GAS 是否有部署為『新版本』！");
            } finally {
                showLoading(false);
            }
        }

        function initMissingRooms() {
            Object.values(ALL_FLOORS).forEach(roomList => {
                roomList.forEach(roomId => {
                    if (!rooms[roomId]) {
                        const isPublic = roomId.includes("公共區域");
                        rooms[roomId] = { name: "", isWarehouse: false, managementFee: isPublic ? 0 : 1600, readings: [] };
                    }
                });
            });
        }

        function renderRoomList() {
            const list = document.getElementById('room-list');
            list.innerHTML = '';
            
            Object.keys(ALL_FLOORS).forEach(floorName => {
                const floorDiv = document.createElement('div');
                floorDiv.innerHTML = `<div class="floor-header" onclick="toggleFloor(this)">${floorName}</div>`;
                const floorContent = document.createElement('div');
                floorContent.className = 'floor-content';
                floorContent.style.display = 'block';
                
                ALL_FLOORS[floorName].forEach(roomId => {
                    const room = rooms[roomId];
                    const item = document.createElement('div');
                    item.className = `room-item ${roomId === currentRoom ? 'active' : ''}`;
                    
                    let displayName = roomId;
                    if (!roomId.includes("公共區域")) {
                        displayName = `${roomId} ${room.name || '(空房)'}`;
                    }
                    
                    item.innerHTML = `${displayName}${room.isWarehouse ? '<span class="warehouse-tag">倉庫</span>' : ''}`;
                    item.onclick = () => {
                        switchRoom(roomId);
                        if(window.innerWidth <= 768) {
                            toggleMenu();
                        }
                    };
                    floorContent.appendChild(item);
                });
                floorDiv.appendChild(floorContent);
                list.appendChild(floorDiv);
            });
        }

        function toggleFloor(el) {
            const content = el.nextElementSibling;
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
        }

        function switchRoom(roomId) {
            currentRoom = roomId;
            renderRoomList();
            const room = rooms[roomId];
            
            let htmlContent = `<h2>${roomId}</h2>`;
            if (!roomId.includes("公共區域")) {
                htmlContent = `<h2>${roomId} ${room.name || '(空房)'}</h2>
                               ${room.isWarehouse ? '<span class="warehouse-tag">倉庫</span>' : ''}`;
            }
            htmlContent += `<p>管理費: ${room.managementFee} 元</p>`;
            
            document.getElementById('current-room-info').innerHTML = htmlContent;
            document.getElementById('meter-reading').value = '';
            renderHistoryTable(roomId);
        }

        function renderHistoryTable(roomId) {
            const tbody = document.querySelector('#history-table tbody');
            tbody.innerHTML = '';
            const room = rooms[roomId];
            
            if (!room || !room.readings || room.readings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:gray; padding:10px;">暫無抄表紀錄</td></tr>`;
                return;
            }

            let sortedReadings = [...room.readings].sort((a, b) => new Date(a.date) - new Date(b.date));
            let displayReadings = [];
            
            for (let i = 0; i < sortedReadings.length; i++) {
                let current = sortedReadings[i];
                let consumed = "-";
                let cost = "-";

                if (i > 0) {
                    let previous = sortedReadings[i - 1];
                    let diff = current.value - previous.value;
                    consumed = diff >= 0 ? diff.toFixed(1) : "度數異常";
                    cost = diff >= 0 ? Math.round(diff * ELECTRICITY_RATE) : "-";
                }

                displayReadings.unshift({ date: current.date, value: current.value, consumed: consumed, cost: cost });
            }

            displayReadings.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="padding:8px;">${r.date}</td>
                    <td>${r.value}</td>
                    <td>${r.consumed}</td>
                    <td>${r.cost !== "-" ? r.cost + ' 元' : '-'}</td>
                    <td>
                        <button onclick="editMeterReading('${r.date}', ${r.value})" style="padding:6px 10px; font-size:13px; margin:2px;">修改</button>
                        <button onclick="deleteMeterReading('${r.date}')" class="btn-danger" style="padding:6px 10px; font-size:13px; margin:2px;">刪除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showApplyStayModal() {
            const select = document.getElementById('apply-room');
            select.innerHTML = '';
            Object.keys(rooms).forEach(roomId => {
                if (!rooms[roomId].name && !roomId.includes("公共區域")) {
                    const option = document.createElement('option');
                    option.value = roomId;
                    option.textContent = roomId;
                    select.appendChild(option);
                }
            });
            document.getElementById('apply-stay-modal').style.display = 'block';
        }

        function showApplyLeaveModal() {
            const select = document.getElementById('leave-room');
            select.innerHTML = '';
            Object.keys(rooms).forEach(roomId => {
                if (rooms[roomId].name && !roomId.includes("公共區域")) {
                    const option = document.createElement('option');
                    option.value = roomId;
                    option.textContent = `${roomId} - ${rooms[roomId].name}`;
                    select.appendChild(option);
                }
            });
            document.getElementById('apply-leave-modal').style.display = 'block';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        async function submitApplyStay() {
            const roomId = document.getElementById('apply-room').value;
            const name = document.getElementById('apply-name').value.trim();
            const isWarehouse = document.getElementById('apply-warehouse').checked;
            if (roomId && name) {
                rooms[roomId].name = name;
                rooms[roomId].isWarehouse = isWarehouse;
                rooms[roomId].managementFee = isWarehouse ? 500 : 1600;
                closeModal('apply-stay-modal');
                switchRoom(roomId);
                await saveToCloud();
                if(window.innerWidth <= 768 && document.getElementById('sidebar').classList.contains('open')) {
                    toggleMenu();
                }
            } else {
                alert('請選擇房間並填寫姓名！');
            }
        }

        async function submitApplyLeave() {
            const roomId = document.getElementById('leave-room').value;
            if (roomId) {
                rooms[roomId].name = '';
                rooms[roomId].isWarehouse = false;
                rooms[roomId].managementFee = 1600;
                closeModal('apply-leave-modal');
                switchRoom(roomId);
                await saveToCloud();
                if(window.innerWidth <= 768 && document.getElementById('sidebar').classList.contains('open')) {
                    toggleMenu();
                }
            }
        }

        function takePhoto() { alert("模擬拍照功能..."); }
        function performOCR() { alert("模擬 OCR 辨識..."); }

        async function saveMeterReading() {
            const date = document.getElementById('meter-date').value;
            const valueStr = document.getElementById('meter-reading').value;
            if (!valueStr) { alert("請輸入電表度數！"); return; }
            const value = parseFloat(valueStr);

            const existingIndex = rooms[currentRoom].readings.findIndex(r => r.date === date);
            if (existingIndex !== -1) {
                rooms[currentRoom].readings[existingIndex].value = value;
            } else {
                rooms[currentRoom].readings.push({ date: date, value: value });
            }
            renderHistoryTable(currentRoom);
            await saveToCloud(); 
        }

        async function editMeterReading(date, oldValue) {
            const newValueStr = prompt(`正在修改房間 ${currentRoom} 於 ${date} 的度數：`, oldValue);
            if (newValueStr === null) return;
            const newValue = parseFloat(newValueStr);
            if (isNaN(newValue)) { alert("請輸入有效的數字！"); return; }
            
            const target = rooms[currentRoom].readings.find(r => r.date === date);
            if (target) {
                target.value = newValue;
                renderHistoryTable(currentRoom);
                await saveToCloud(); 
            }
        }

        async function deleteMeterReading(date) {
            if (confirm(`確定要刪除房間 ${currentRoom} 於 ${date} 的這筆抄表紀錄嗎？`)) {
                rooms[currentRoom].readings = rooms[currentRoom].readings.filter(r => r.date !== date);
                renderHistoryTable(currentRoom);
                await saveToCloud(); 
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(rooms, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', `dorm_backup_${new Date().toISOString().slice(0,10)}.json`);
            link.click();
        }

        function triggerImport() { document.getElementById('import-file').click(); }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const importedRooms = JSON.parse(e.target.result);
                    if (typeof importedRooms === 'object' && importedRooms !== null) {
                        rooms = importedRooms;
                        initMissingRooms();
                        switchRoom(currentRoom);
                        await saveToCloud(); 
                    } else { alert("檔案格式不正確！"); }
                } catch (err) { alert("讀取檔案失敗！"); }
            };
            reader.readAsText(file);
            input.value = '';
        }

        window.onload = function() {
            loadCloudData();
        };
    </script>
</body>
</html>
